suite: countif_kana_folding_probes
description: >
  Mac Excel ja-JP COUNTIF text-equality folds certain Japanese character
  classes onto a canonical form before comparing. The two existing
  divergences (countif_jp_katakana_vs_hiragana, countif_fullwidth_star_literal)
  pin two specific behaviours but do not delineate the full extent of the
  folding. These probes map out the boundaries — hiragana/katakana,
  half-width/full-width katakana, full-width punctuation, full-width digits,
  voiced-mark normalisation — before designing the criteria.cpp matcher fix.
tolerance: { abs: 0, rel: 0 }
locale: ja-JP
cases:
  # ---------------------------------------------------------------------
  # Hiragana <-> Katakana folding (the headline case).
  # ---------------------------------------------------------------------
  - id: countif_kana_hira_eq_kata_simple
    description: "Hiragana criterion against katakana cell -- Mac folds: あ matches ア"
    setup: { A1: "あ", A2: "ア", A3: "い" }
    formula: '=COUNTIF(A1:A3, "あ")'

  - id: countif_kana_kata_eq_hira_simple
    description: "Katakana criterion against hiragana cell -- mirror: ア matches あ"
    setup: { A1: "あ", A2: "ア", A3: "い" }
    formula: '=COUNTIF(A1:A3, "ア")'

  - id: countif_kana_word_with_sokuon
    description: "あっぷる vs アップル -- folds sokuon (っ vs ッ) too"
    setup: { A1: "アップル", A2: "あっぷる", A3: "アップル" }
    formula: '=COUNTIF(A1:A3, "アップル")'

  - id: countif_kana_voiced_mark
    description: "が (voiced) vs ガ (voiced katakana) -- folds with voicing"
    setup: { A1: "が", A2: "ガ", A3: "か" }
    formula: '=COUNTIF(A1:A3, "が")'

  - id: countif_kana_handakuten
    description: "ぱ vs パ -- folds with handakuten"
    setup: { A1: "ぱ", A2: "パ", A3: "ば" }
    formula: '=COUNTIF(A1:A3, "ぱ")'

  - id: countif_kana_long_mark_passthrough
    description: "Long mark ー is itself, but should still fold ベー vs べー"
    setup: { A1: "ベー", A2: "べー", A3: "ベ" }
    formula: '=COUNTIF(A1:A3, "ベー")'

  # ---------------------------------------------------------------------
  # Half-width katakana <-> Full-width katakana folding.
  # ---------------------------------------------------------------------
  - id: countif_kana_halfwidth_eq_fullwidth
    description: "Half-width ｱ vs full-width ア -- folds"
    setup: { A1: "ｱ", A2: "ア", A3: "イ" }
    formula: '=COUNTIF(A1:A3, "ｱ")'

  - id: countif_kana_halfwidth_eq_hiragana
    description: "Half-width ｱ vs hiragana あ -- folds (transitive)"
    setup: { A1: "ｱ", A2: "あ", A3: "い" }
    formula: '=COUNTIF(A1:A3, "ｱ")'

  - id: countif_kana_halfwidth_voiced
    description: "Half-width voiced ｶﾞ vs full-width ガ -- composed"
    setup: { A1: "ｶﾞ", A2: "ガ", A3: "カ" }
    formula: '=COUNTIF(A1:A3, "ｶﾞ")'

  # ---------------------------------------------------------------------
  # Full-width punctuation / wildcard folding.
  # ---------------------------------------------------------------------
  - id: countif_kana_fullwidth_star_as_wildcard
    description: "＊ folds to * which is a wildcard -- matches everything"
    setup: { A1: "＊", A2: "*", A3: "abc" }
    formula: '=COUNTIF(A1:A3, "＊")'

  - id: countif_kana_fullwidth_question_as_wildcard
    description: "？ folds to ? which is a single-char wildcard"
    setup: { A1: "a", A2: "ab", A3: "？" }
    formula: '=COUNTIF(A1:A3, "？")'

  - id: countif_kana_fullwidth_tilde_escape
    description: "～＊ -- does ～ fold to ~ and become an escape?"
    setup: { A1: "＊", A2: "*", A3: "abc" }
    formula: '=COUNTIF(A1:A3, "～＊")'

  - id: countif_kana_fullwidth_at_literal
    description: "＠ -- non-wildcard punctuation: folds onto @ literal?"
    setup: { A1: "＠", A2: "@", A3: "x" }
    formula: '=COUNTIF(A1:A3, "＠")'

  # ---------------------------------------------------------------------
  # Full-width digits / Latin -- do they fold for COUNTIF text equality?
  # ---------------------------------------------------------------------
  - id: countif_kana_fullwidth_digits
    description: "１２３ vs 123 -- do digits fold?"
    setup: { A1: "１２３", A2: "123", A3: "abc" }
    formula: '=COUNTIF(A1:A3, "１２３")'

  - id: countif_kana_fullwidth_latin
    description: "ＡＢＣ vs ABC -- do Latin letters fold?"
    setup: { A1: "ＡＢＣ", A2: "ABC", A3: "xyz" }
    formula: '=COUNTIF(A1:A3, "ＡＢＣ")'

  - id: countif_kana_fullwidth_space
    description: "Full-width 　 vs ASCII space -- do they fold?"
    setup: { A1: "a　b", A2: "a b", A3: "ab" }
    formula: '=COUNTIF(A1:A3, "a　b")'

  # ---------------------------------------------------------------------
  # SUMIF parity check -- folding should apply to SUMIF criteria too.
  # ---------------------------------------------------------------------
  - id: sumif_kana_hira_eq_kata
    description: "SUMIF parity: hiragana criterion sums katakana matches"
    setup: { A1: "あ", A2: "ア", A3: "い", B1: 1, B2: 2, B3: 3 }
    formula: '=SUMIF(A1:A3, "あ", B1:B3)'
