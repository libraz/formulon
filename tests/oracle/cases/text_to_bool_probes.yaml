suite: text_to_bool_probes
description: >
  Mac Excel 365 (ja-JP) probe for whether text strings "TRUE"/"true"/
  "FALSE"/"false" coerce to bool when passed to a function argument that
  expects a logical value. IronCalc accepts these strings (e.g.
  BETA.DIST(..., "TRUE", ...)), but Formulon's `coerce_to_bool` currently
  rejects them and surfaces #VALUE! — based on a comment that claims
  Excel does the same. This probe settles the question by asking Mac
  directly across IF, NOT, AND, BETA.DIST cumulative, and direct
  coercion via N(). Mac's truth becomes the reference; we update
  `coerce_to_bool` only if Mac actually accepts these strings.
tolerance: { abs: 1e-12, rel: 0 }
locale: ja-JP
cases:
  # ---------------------------------------------------------------------
  # A) IF with text-bool condition. If Mac accepts "TRUE" as a logical,
  # =IF("TRUE",1,0) returns 1; otherwise #VALUE!.
  - id: text_bool_if_uppercase_true
    description: "IF(\"TRUE\", 1, 0)"
    formula: "=IF(\"TRUE\", 1, 0)"

  - id: text_bool_if_lowercase_true
    description: "IF(\"true\", 1, 0)"
    formula: "=IF(\"true\", 1, 0)"

  - id: text_bool_if_uppercase_false
    description: "IF(\"FALSE\", 1, 0) - if accepted, returns 0"
    formula: "=IF(\"FALSE\", 1, 0)"

  - id: text_bool_if_mixed_case
    description: "IF(\"True\", 1, 0)"
    formula: "=IF(\"True\", 1, 0)"

  - id: text_bool_if_garbage
    description: "IF(\"yes\", 1, 0) - non-bool text should be #VALUE!"
    formula: "=IF(\"yes\", 1, 0)"

  # ---------------------------------------------------------------------
  # B) NOT with text-bool. =NOT("TRUE") should be FALSE if accepted.
  - id: text_bool_not_uppercase_true
    description: "NOT(\"TRUE\") - bool result FALSE if accepted"
    formula: "=NOT(\"TRUE\")"

  - id: text_bool_not_lowercase_false
    description: "NOT(\"false\")"
    formula: "=NOT(\"false\")"

  # ---------------------------------------------------------------------
  # C) AND with text-bool. =AND("TRUE", "TRUE") = TRUE if accepted.
  - id: text_bool_and_two_true
    description: "AND(\"TRUE\", \"TRUE\")"
    formula: "=AND(\"TRUE\", \"TRUE\")"

  - id: text_bool_and_true_false
    description: "AND(\"TRUE\", \"FALSE\")"
    formula: "=AND(\"TRUE\", \"FALSE\")"

  - id: text_bool_and_whitespace
    description: >-
      AND("  TRUE  ", TRUE). Mac asymmetry: IF rejects whitespace-padded
      bool-text (#VALUE!), but AND/OR/XOR/IFS go through the stricter
      `logical_coerce` path which TRIMS surrounding ASCII whitespace
      before matching TRUE/FALSE. This probe locks in TRUE.
    formula: "=AND(\"  TRUE  \", TRUE)"

  - id: text_bool_or_whitespace
    description: >-
      OR("  FALSE  ", FALSE). Sibling to text_bool_and_whitespace; locks
      in FALSE and confirms the asymmetry holds for OR as well.
    formula: "=OR(\"  FALSE  \", FALSE)"

  # ---------------------------------------------------------------------
  # D) BETA.DIST with text cumulative argument. This is the actual
  # IronCalc case (rows 48-49 of statistical/BETADIST_BETAINV.xlsx).
  - id: text_bool_betadist_uppercase
    description: "BETA.DIST(0.234, 2, 2.5, \"TRUE\", 0.15, 1.2)"
    formula: "=BETA.DIST(0.234, 2, 2.5, \"TRUE\", 0.15, 1.2)"

  - id: text_bool_betadist_lowercase
    description: "BETA.DIST(0.234, 2, 2.5, \"true\", 0.15, 1.2)"
    formula: "=BETA.DIST(0.234, 2, 2.5, \"true\", 0.15, 1.2)"

  - id: text_bool_betadist_pdf_text
    description: "BETA.DIST(0.234, 2, 2.5, \"FALSE\", 0.15, 1.2) - PDF mode"
    formula: "=BETA.DIST(0.234, 2, 2.5, \"FALSE\", 0.15, 1.2)"

  # ---------------------------------------------------------------------
  # E) Direct coercion via N() / arithmetic. Less interesting because
  # arithmetic forces numeric coercion, not bool. But N("TRUE") should
  # return 0 (un-parseable as number) on Mac per the existing comment.
  - id: text_bool_n_uppercase_true
    description: "N(\"TRUE\") - direct numeric coercion test"
    formula: "=N(\"TRUE\")"

  # ---------------------------------------------------------------------
  # F) NORM.DIST with text cumulative for cross-function confirmation.
  - id: text_bool_normdist_uppercase
    description: "NORM.DIST(0, 0, 1, \"TRUE\")"
    formula: "=NORM.DIST(0, 0, 1, \"TRUE\")"

  # ---------------------------------------------------------------------
  # G) Numeric-text in IF condition. Mac coerces numeric strings via the
  # numeric path: "0" -> FALSE (else branch), nonzero -> TRUE.
  - id: text_num_if_zero_string
    description: "IF(\"0\", 1, 2) - numeric-text zero coerces to FALSE"
    formula: "=IF(\"0\", 1, 2)"

  - id: text_num_if_one_string
    description: "IF(\"1\", 1, 2) - numeric-text one coerces to TRUE"
    formula: "=IF(\"1\", 1, 2)"

  - id: text_num_if_negative_string
    description: "IF(\"-1\", 1, 2) - non-zero negative-text -> TRUE"
    formula: "=IF(\"-1\", 1, 2)"

  - id: text_num_if_fractional_string
    description: "IF(\"0.5\", 1, 2) - fractional numeric-text -> TRUE"
    formula: "=IF(\"0.5\", 1, 2)"

  # ---------------------------------------------------------------------
  # H) Almost-bool / decorated text. Anything that is not exactly
  # TRUE / FALSE (after trim, case-insensitive) is expected to fall
  # through to the numeric path and surface #VALUE!.
  - id: text_bool_if_true_with_punct
    description: "IF(\"TRUE!!\", 1, 2)"
    formula: "=IF(\"TRUE!!\", 1, 2)"

  - id: text_bool_if_true_with_whitespace
    description: "IF(\"  TRUE  \", 1, 2) - ASCII whitespace trim"
    formula: "=IF(\"  TRUE  \", 1, 2)"

  # ---------------------------------------------------------------------
  # I) Localised TRUE/FALSE words. Mac ja-JP is the reference; document
  # whether kanji / hiragana truth-words are recognised.
  - id: text_bool_if_kanji_true
    description: "IF(\"真\", 1, 0) - Japanese kanji 'true'"
    formula: "=IF(\"真\", 1, 0)"

  - id: text_bool_if_kanji_false
    description: "IF(\"偽\", 1, 0) - Japanese kanji 'false'"
    formula: "=IF(\"偽\", 1, 0)"

  - id: text_bool_if_hiragana_yes
    description: "IF(\"はい\", 1, 0) - Japanese 'yes'"
    formula: "=IF(\"はい\", 1, 0)"

  - id: text_bool_if_hiragana_no
    description: "IF(\"いいえ\", 1, 0) - Japanese 'no'"
    formula: "=IF(\"いいえ\", 1, 0)"

  - id: text_bool_if_french_true
    description: "IF(\"VRAI\", 1, 0) - French TRUE"
    formula: "=IF(\"VRAI\", 1, 0)"

  - id: text_bool_if_german_true
    description: "IF(\"WAHR\", 1, 0) - German TRUE"
    formula: "=IF(\"WAHR\", 1, 0)"

  - id: text_bool_if_chinese_true
    description: "IF(\"正\", 1, 0) - Chinese TRUE-ish kanji"
    formula: "=IF(\"正\", 1, 0)"

  # ---------------------------------------------------------------------
  # J) Logical operators with numeric-text and mixed args. AND uses the
  # stricter `logical_coerce` path that REJECTS numeric-text in
  # Formulon today; this asks Mac whether that strictness matches.
  - id: text_bool_not_zero_string
    description: "NOT(\"0\") - does NOT use the lenient or strict path?"
    formula: "=NOT(\"0\")"

  - id: text_bool_not_one_string
    description: "NOT(\"1\")"
    formula: "=NOT(\"1\")"

  - id: text_bool_and_zero_one_strings
    description: "AND(\"0\", \"1\") - AND under strict text rules"
    formula: "=AND(\"0\", \"1\")"

  - id: text_bool_and_numeric_direct
    description: "AND(1, 0) - direct numeric, baseline"
    formula: "=AND(1, 0)"

  - id: text_bool_or_mixed_textbool_number
    description: "OR(\"FALSE\", 1) - mixed bool-text and number"
    formula: "=OR(\"FALSE\", 1)"

  # ---------------------------------------------------------------------
  # K) Bool-to-text via TEXT() and inverse via N().
  - id: text_bool_text_of_true_text_format
    description: "TEXT(TRUE, \"@\") - bool with text format"
    formula: "=TEXT(TRUE, \"@\")"

  - id: text_bool_n_uppercase_false
    description: "N(\"FALSE\") - symmetric to N(\"TRUE\")"
    formula: "=N(\"FALSE\")"

  # ---------------------------------------------------------------------
  # L) Bool-in-numeric-context probes.
  - id: text_bool_sum_bool_and_number
    description: "SUM(TRUE, 1) - bool counts as 1"
    formula: "=SUM(TRUE, 1)"

  - id: text_bool_sum_textbool_and_number
    description: "SUM(\"TRUE\", 1) - text-bool inside SUM"
    formula: "=SUM(\"TRUE\", 1)"

  - id: text_bool_arith_textbool_plus_number
    description: "1 + \"TRUE\" - arithmetic text-bool coercion"
    formula: "=1 + \"TRUE\""

  # ---------------------------------------------------------------------
  # M) Bool / text-bool in comparison operators. Excel's `=` is type-
  # aware: text and number compare unequal even when their printed
  # forms match. The probes record Mac's verdict for posterity.
  - id: text_bool_compare_textbool_equals_bool
    description: "\"TRUE\" = TRUE - lexical or coerced equality?"
    formula: "=\"TRUE\" = TRUE"

  - id: text_bool_compare_bool_equals_one
    description: "TRUE = 1 - cross-type equality"
    formula: "=TRUE = 1"

  - id: text_bool_compare_bool_gt_zero
    description: "TRUE > 0 - bool ordering vs. number"
    formula: "=TRUE > 0"
