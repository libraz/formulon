suite: datetime
description: DATE / TIME / YEAR / MONTH / DAY / HOUR / MINUTE / SECOND / WEEKDAY / EDATE / EOMONTH / DAYS / DAYS360 / WEEKNUM / ISOWEEKNUM / YEARFRAC / DATEDIF / NETWORKDAYS / NETWORKDAYS.INTL / WORKDAY / WORKDAY.INTL
tolerance: { abs: 1.0e-12, rel: 1.0e-12 }
locale: ja-JP
cases:
  # -- DATE / TIME ---------------------------------------------------------
  - id: date_2024_4_22
    formula: "=DATE(2024,4,22)"

  - id: date_two_digit_year_adds_1900
    description: "Excel: year < 1900 is biased by +1900"
    formula: "=DATE(26,4,23)"

  - id: date_negative_month_normalises
    description: "DATE(2026, 0, 15) -> Dec 2025"
    formula: "=DATE(2026,0,15)"

  - id: date_day_overflow_normalises
    formula: "=DATE(2024,1,32)"

  - id: time_mid_day
    formula: "=TIME(12,0,0)"

  - id: time_wrap_25_hours
    description: "TIME(25,0,0) wraps to 01:00 (fraction 1/24)"
    formula: "=TIME(25,0,0)"

  # -- YEAR / MONTH / DAY --------------------------------------------------
  - id: year_of_serial
    formula: "=YEAR(DATE(2024,4,22))"

  - id: month_of_serial
    formula: "=MONTH(DATE(2024,4,22))"

  - id: day_of_serial
    formula: "=DAY(DATE(2024,4,22))"

  # -- HOUR / MINUTE / SECOND ---------------------------------------------
  - id: hour_of_time
    formula: "=HOUR(TIME(13,45,30))"

  - id: minute_of_time
    formula: "=MINUTE(TIME(13,45,30))"

  - id: second_of_time
    formula: "=SECOND(TIME(13,45,30))"

  # -- WEEKDAY -------------------------------------------------------------
  - id: weekday_default_sun1
    description: "2024/4/22 is a Monday; return_type=1 gives 2"
    formula: "=WEEKDAY(DATE(2024,4,22))"

  - id: weekday_mon1
    description: "return_type=2 (Mon=1) of Monday = 1"
    formula: "=WEEKDAY(DATE(2024,4,22),2)"

  - id: weekday_mon0
    description: "return_type=3 (Mon=0) of Monday = 0"
    formula: "=WEEKDAY(DATE(2024,4,22),3)"

  # -- EDATE / EOMONTH / DAYS ---------------------------------------------
  - id: edate_plus_three_months
    formula: "=EDATE(DATE(2024,4,22),3)"

  - id: eomonth_same_month
    formula: "=EOMONTH(DATE(2024,4,15),0)"

  - id: eomonth_forward_two
    formula: "=EOMONTH(DATE(2024,4,15),2)"

  - id: days_positive
    formula: "=DAYS(DATE(2024,5,1),DATE(2024,4,22))"

  - id: days_negative
    formula: "=DAYS(DATE(2024,4,22),DATE(2024,5,1))"

  # -- 1900 leap-bug -------------------------------------------------------
  # N() forces a numeric read; xlwings can't coerce Feb 29 1900 to a Python
  # datetime otherwise, and the cell's auto-applied date format would
  # intercept the raw serial.
  - id: date_1900_02_28_serial
    description: "Excel: DATE(1900,2,28) -> 59"
    formula: "=N(DATE(1900,2,28))"

  - id: date_1900_ghost_serial
    description: "Excel: DATE(1900,2,29) -> 60 (the ghost leap day)"
    formula: "=N(DATE(1900,2,29))"

  - id: date_1900_03_01_serial
    description: "Excel: DATE(1900,3,1) -> 61 (NOT 60)"
    formula: "=N(DATE(1900,3,1))"

  # -- WEEKNUM -------------------------------------------------------------
  - id: weeknum_mid_year_default
    description: "Default return_type=1 (Sun start), mid-year date"
    formula: "=WEEKNUM(DATE(2024,7,4))"

  - id: weeknum_jan_1_default
    description: "Jan 1 is always in week 1 under the non-ISO types"
    formula: "=WEEKNUM(DATE(2024,1,1))"

  - id: weeknum_monday_type
    description: "return_type=2 (Mon start); 2024-01-01 is a Monday -> week 1"
    formula: "=WEEKNUM(DATE(2024,1,1),2)"

  - id: weeknum_iso_type_21
    description: "return_type=21 is ISO 8601; 2024-01-01 -> week 1"
    formula: "=WEEKNUM(DATE(2024,1,1),21)"

  - id: weeknum_iso_jan_1_2023_is_52
    description: "2023-01-01 (Sun) -> ISO week 52 of 2022"
    formula: "=WEEKNUM(DATE(2023,1,1),21)"

  - id: weeknum_invalid_type_is_num
    description: "Unsupported return_type -> #NUM!"
    formula: "=WEEKNUM(DATE(2024,1,1),99)"

  # -- ISOWEEKNUM ----------------------------------------------------------
  - id: isoweeknum_mid_year
    formula: "=ISOWEEKNUM(DATE(2024,7,4))"

  - id: isoweeknum_jan_1_2023
    description: "ISO: 2023-01-01 is part of week 52 of 2022"
    formula: "=ISOWEEKNUM(DATE(2023,1,1))"

  - id: isoweeknum_dec_31_2024
    description: "ISO: 2024-12-31 (Tue) is part of week 1 of 2025"
    formula: "=ISOWEEKNUM(DATE(2024,12,31))"

  # -- YEARFRAC ------------------------------------------------------------
  - id: yearfrac_basis_0_half_year
    description: "US 30/360 NASD half-year -> 0.5 exactly"
    formula: "=YEARFRAC(DATE(2024,1,1),DATE(2024,7,1),0)"

  - id: yearfrac_basis_1_half_leap_year
    formula: "=YEARFRAC(DATE(2024,1,1),DATE(2024,7,1),1)"

  - id: yearfrac_basis_2_half_leap_year
    description: "Actual/360 over 182 days"
    formula: "=YEARFRAC(DATE(2024,1,1),DATE(2024,7,1),2)"

  - id: yearfrac_basis_3_half_leap_year
    description: "Actual/365 over 182 days"
    formula: "=YEARFRAC(DATE(2024,1,1),DATE(2024,7,1),3)"

  - id: yearfrac_basis_4_half_year
    description: "European 30/360 half-year -> 0.5 exactly"
    formula: "=YEARFRAC(DATE(2024,1,1),DATE(2024,7,1),4)"

  - id: yearfrac_one_full_year_basis_1
    description: "Exact anniversary -> 1.0 under the Feb 29 denominator rule"
    formula: "=YEARFRAC(DATE(2023,1,1),DATE(2024,1,1),1)"

  - id: yearfrac_leap_basis_1
    description: "Short interval straddling Feb 29 2024 -> denom 366"
    formula: "=YEARFRAC(DATE(2024,2,28),DATE(2024,3,1),1)"

  - id: yearfrac_invalid_basis_is_num
    formula: "=YEARFRAC(DATE(2024,1,1),DATE(2024,7,1),5)"

  # -- DATEDIF -------------------------------------------------------------
  - id: datedif_years
    description: "4 years 3 months between the two dates"
    formula: "=DATEDIF(DATE(2020,3,15),DATE(2024,7,1),\"Y\")"

  - id: datedif_months
    description: "d2 < d1 -> the trailing month is not yet complete"
    formula: "=DATEDIF(DATE(2024,1,15),DATE(2024,7,1),\"M\")"

  - id: datedif_days
    formula: "=DATEDIF(DATE(2024,1,1),DATE(2024,1,15),\"D\")"

  - id: datedif_ym
    description: "Complete months ignoring years"
    formula: "=DATEDIF(DATE(2020,3,15),DATE(2024,7,1),\"YM\")"

  - id: datedif_yd_same_month_day
    description: "YD collapses to 0 when start's (m,d) matches end's"
    formula: "=DATEDIF(DATE(2020,3,15),DATE(2024,3,15),\"YD\")"

  - id: datedif_md_same_day
    description: "MD is 0 when the day-of-month matches"
    formula: "=DATEDIF(DATE(2024,1,15),DATE(2024,7,15),\"MD\")"

  - id: datedif_end_before_start_is_num
    formula: "=DATEDIF(DATE(2024,7,1),DATE(2020,3,15),\"Y\")"

  - id: datedif_unknown_unit_is_num
    formula: "=DATEDIF(DATE(2024,1,1),DATE(2024,12,31),\"X\")"

  # -- NETWORKDAYS ---------------------------------------------------------
  - id: networkdays_one_week
    description: "Mon..Fri -> 5 business days"
    formula: "=NETWORKDAYS(DATE(2024,1,1),DATE(2024,1,5))"

  - id: networkdays_two_weeks
    description: "Mon..Fri-of-next-week -> 10 business days"
    formula: "=NETWORKDAYS(DATE(2024,1,1),DATE(2024,1,12))"

  - id: networkdays_single_day_weekday
    description: "Single Monday -> 1"
    formula: "=NETWORKDAYS(DATE(2024,1,1),DATE(2024,1,1))"

  - id: networkdays_single_day_weekend
    description: "2024-01-06 is Saturday -> 0"
    formula: "=NETWORKDAYS(DATE(2024,1,6),DATE(2024,1,6))"

  - id: networkdays_with_array_holidays
    description: "Array-literal holidays subtract matching business days"
    formula: "=NETWORKDAYS(DATE(2024,1,1),DATE(2024,1,5),{45292,45293})"

  - id: networkdays_reversed_range
    description: "Excel returns the negated count when start > end"
    formula: "=NETWORKDAYS(DATE(2024,1,5),DATE(2024,1,1))"

  # -- WORKDAY -------------------------------------------------------------
  - id: workday_forward_5
    description: "+5 business days from Mon 2024-01-01 -> Mon 2024-01-08"
    formula: "=WORKDAY(DATE(2024,1,1),5)"

  - id: workday_backward_5
    description: "-5 business days from Mon 2024-01-15 -> Mon 2024-01-08"
    formula: "=WORKDAY(DATE(2024,1,15),-5)"

  - id: workday_zero_days
    description: "WORKDAY(start, 0) returns start unchanged"
    formula: "=WORKDAY(DATE(2024,1,3),0)"

  - id: workday_with_array_holidays
    description: "Holidays extend the run forward"
    formula: "=WORKDAY(DATE(2024,1,1),5,{45293,45294})"

  # -- DAYS360 -------------------------------------------------------------
  - id: days360_us_method
    description: "US/NASD: start day < 30, end day 31 -> end rolls to next month day 1"
    formula: "=DAYS360(DATE(2024,2,15),DATE(2024,3,31))"

  - id: days360_european_method
    description: "European: both 31s cap at 30; Jan 31 -> Mar 31 = 60"
    formula: "=DAYS360(DATE(2024,1,31),DATE(2024,3,31),TRUE)"

  - id: days360_end_31_start_lt_30
    description: "US: 31 at end with start < 30 rolls to day 1 of next month"
    formula: "=DAYS360(DATE(2024,2,15),DATE(2024,3,31),FALSE)"

  - id: days360_full_year
    description: "Full year is exactly 360 days on the 360-day calendar"
    formula: "=DAYS360(DATE(2024,1,1),DATE(2025,1,1))"

  # -- NETWORKDAYS.INTL ----------------------------------------------------
  - id: networkdays_intl_default
    description: "Default weekend (Sat+Sun) matches NETWORKDAYS"
    formula: "=NETWORKDAYS.INTL(DATE(2024,1,1),DATE(2024,1,12))"

  - id: networkdays_intl_explicit_1
    description: "Selector 1 is the documented Sat+Sun pattern"
    formula: "=NETWORKDAYS.INTL(DATE(2024,1,1),DATE(2024,1,14),1)"

  - id: networkdays_intl_string_mask
    description: "7-char `0000011` string selects Sat+Sun weekend"
    formula: "=NETWORKDAYS.INTL(DATE(2024,1,1),DATE(2024,1,14),\"0000011\")"

  - id: networkdays_intl_sun_only
    description: "Selector 11 = Sunday-only weekend"
    formula: "=NETWORKDAYS.INTL(DATE(2024,1,1),DATE(2024,1,7),11)"

  # -- WORKDAY.INTL --------------------------------------------------------
  - id: workday_intl_default
    description: "Default weekend (Sat+Sun) matches WORKDAY"
    formula: "=WORKDAY.INTL(DATE(2024,1,1),5)"

  - id: workday_intl_sun_only
    description: "Sunday-only weekend: Sat Jan 6 is a working day"
    formula: "=WORKDAY.INTL(DATE(2024,1,1),5,11)"

  - id: workday_intl_string_mask
    description: "String mask equivalent to selector 1"
    formula: "=WORKDAY.INTL(DATE(2024,1,1),5,\"0000011\")"
