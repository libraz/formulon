suite: operators
description: Arithmetic / comparison / concatenation operators with coercion
tolerance: { abs: 1.0e-12, rel: 1.0e-12 }
locale: ja-JP
cases:
  # -- Arithmetic ----------------------------------------------------------
  - id: add_integers
    formula: "=1+2"

  - id: add_floats
    formula: "=1.5+2.25"

  - id: subtract
    formula: "=10-3"

  - id: multiply
    formula: "=6*7"

  - id: divide_exact
    formula: "=10/4"

  - id: divide_by_zero
    formula: "=1/0"

  - id: power_op
    formula: "=2^10"

  - id: unary_negate
    formula: "=-5"

  - id: unary_plus
    formula: "=+5"

  - id: percent_unary
    description: "Postfix % divides by 100"
    formula: "=50%"

  - id: percent_in_expression
    formula: "=20*10%"

  # -- Numeric string coercion -------------------------------------------
  - id: add_numeric_string
    description: "Excel: \"3\"+4 coerces string to number"
    formula: "=\"3\"+4"

  - id: add_non_numeric_string
    formula: "=\"abc\"+4"

  - id: add_bool_true_is_one
    formula: "=TRUE+1"

  - id: add_bool_false_is_zero
    formula: "=FALSE+5"

  # -- Precedence ----------------------------------------------------------
  - id: precedence_mul_over_add
    formula: "=1+2*3"

  - id: precedence_paren_overrides
    formula: "=(1+2)*3"

  - id: precedence_pow_over_mul
    formula: "=2*3^2"

  - id: precedence_unary_over_pow
    description: "Excel: unary minus binds tighter than ^, so -2^2 = 4 (not -4)"
    formula: "=-2^2"

  # -- Comparison (returns BOOL) ------------------------------------------
  - id: cmp_eq_true
    formula: "=3=3"

  - id: cmp_eq_false
    formula: "=3=4"

  - id: cmp_ne
    formula: "=3<>4"

  - id: cmp_lt
    formula: "=3<5"

  - id: cmp_lte
    formula: "=5<=5"

  - id: cmp_gt
    formula: "=5>3"

  - id: cmp_gte
    formula: "=3>=5"

  - id: cmp_number_vs_text
    description: "Excel: numbers always compare less than text"
    formula: "=1<\"a\""

  - id: cmp_text_case_insensitive_eq
    description: "Excel = on text is case-insensitive"
    formula: "=\"ABC\"=\"abc\""

  - id: cmp_bool_greater_than_text
    description: "Excel rank: number < text < FALSE < TRUE"
    formula: "=TRUE>\"zzz\""

  # -- Concatenation ------------------------------------------------------
  - id: concat_text
    formula: "=\"a\"&\"b\""

  - id: concat_number_coerces
    description: "Number & text coerces number to its shortest text form"
    formula: "=1&\"x\""

  - id: concat_bool
    description: "TRUE in concat becomes the text \"TRUE\""
    formula: "=TRUE&\"x\""

  - id: concat_float
    formula: "=3.14&\"\""

  # -- Empty-string coercion in arithmetic --------------------------------
  # These probe whether Excel coerces a literal empty string to 0 in
  # arithmetic contexts or rejects it with #VALUE!. Used to decide whether
  # `coerce_to_number("")` should be 0 or an error in the calc engine.
  - id: empty_string_plus_number
    formula: "=\"\"+1"

  - id: empty_string_minus_number
    formula: "=\"\"-1"

  - id: empty_string_times_number
    formula: "=\"\"*2"

  - id: empty_string_divide_number
    formula: "=\"\"/2"

  - id: unary_minus_empty_string
    formula: "=-\"\""

  - id: unary_plus_empty_string
    formula: "=+\"\""

  - id: number_plus_empty_string
    formula: "=1+\"\""

  - id: empty_string_concat_number
    description: "Concat always coerces number to shortest text, so \"\"&1 -> \"1\""
    formula: "=\"\"&1"

  - id: empty_string_eq_zero
    description: "Equality: is \"\" equal to 0?"
    formula: "=\"\"=0"

  # -- Error propagation --------------------------------------------------
  - id: error_propagates_through_add
    formula: "=1/0+1"

  - id: error_leftmost_wins
    description: "Left-most error wins: #DIV/0! beats #N/A"
    formula: "=1/0+NA()"

  # =========================================================================
  # Expanded probes: blank-cell coercion, bool ordering, mixed-type
  # comparison, range/scalar implicit intersection in operators, overflow.
  # =========================================================================

  # -- Blank cell coercion in arithmetic / concat / compare ---------------
  - id: blank_cell_plus_number
    description: "=A1+5 where A1 is blank -> 5"
    setup: {}
    formula: "=A1+5"

  - id: blank_cell_times_number
    description: "Blank cell coerces to 0 in arithmetic"
    setup: {}
    formula: "=A1*5"

  - id: blank_cell_concat_text
    description: "=A1&\"x\" where A1 is blank -> \"x\""
    setup: {}
    formula: "=A1&\"x\""

  - id: blank_cell_eq_zero
    description: "Blank cell == 0 in equality"
    setup: {}
    formula: "=A1=0"

  - id: blank_cell_eq_empty_string
    description: "Blank cell == \"\" in equality"
    setup: {}
    formula: "=A1=\"\""

  - id: blank_cell_lt_zero
    description: "Blank cell < 0 — Excel: FALSE (blank coerces to 0 here)"
    setup: {}
    formula: "=A1<0"

  # -- Bool ordering rules: TRUE > any text > any number ------------------
  - id: cmp_true_gt_text
    description: "Boolean TRUE > any text in mixed-type ordering"
    formula: "=TRUE>\"zzz\""

  - id: cmp_true_gt_number
    description: "Boolean TRUE > any finite number in Excel ordering"
    formula: "=TRUE>1E300"

  - id: cmp_text_gt_number
    description: "Any text > any number in Excel ordering"
    formula: "=\"a\">1E300"

  - id: cmp_false_gt_zero
    description: "FALSE > 0 because FALSE is in the bool tier above numeric"
    formula: "=FALSE>0"

  # -- Mixed-type equality ------------------------------------------------
  - id: cmp_text_number_eq_is_false
    description: "\"5\" = 5 -> FALSE (Excel: text and number are different types)"
    formula: "=\"5\"=5"

  - id: cmp_numeric_text_lt_number
    description: "\"5\" < 5 -> FALSE because text is in higher tier than number"
    formula: "=\"5\"<5"

  # -- Negative zero ------------------------------------------------------
  - id: cmp_neg_zero_eq_zero
    description: "-0 == 0 in IEEE; Excel agrees"
    formula: "=-0=0"

  - id: cmp_neg_zero_text_eq_text_zero
    description: "TEXT(-0,\"0\") rendering — does Mac Excel emit \"0\" or \"-0\"?"
    formula: "=TEXT(-0,\"0\")"

  # -- Percent compounding ------------------------------------------------
  - id: percent_compounded
    description: "100%% -> 1; the unary % stacks"
    formula: "=100%%"

  - id: percent_after_arithmetic
    description: "Excel parses 5+10% as 5 + (10%) = 5.1"
    formula: "=5+10%"

  # -- Power operator edges -----------------------------------------------
  - id: power_zero_to_zero
    description: "0^0 — IEEE returns 1; Excel agrees"
    formula: "=0^0"

  - id: power_negative_base_fractional_exp
    description: "(-2)^0.5 — non-real result; Excel: #NUM!"
    formula: "=(-2)^0.5"

  - id: power_overflow
    description: "10^309 overflows IEEE -> #NUM!"
    formula: "=10^309"

  # -- Date / serial arithmetic ------------------------------------------
  - id: date_string_plus_number
    description: "\"2024-01-01\"+1 — Excel coerces text-as-date and adds; result is the next-day serial"
    formula: "=\"2024-01-01\"+1"

  - id: time_string_times_number
    description: "\"01:00\"*24 -> 1.0 (1 hour *24 = 1 day)"
    formula: "=\"01:00\"*24"

  # -- Concat with error / bool ------------------------------------------
  - id: concat_error_propagates
    description: "Error on left of & propagates"
    formula: "=#REF!&\"x\""

  - id: concat_bool_to_text
    description: "TRUE & \"x\" -> \"TRUEx\""
    formula: "=TRUE&\"x\""

  # -- Implicit intersection / range as operand --------------------------
  - id: range_plus_scalar_at_aligned_row
    description: "=A1:A3+10 at Z1: spill anchor at A1 (row 1 in range), result 11"
    setup: { A1: 1, A2: 2, A3: 3 }
    formula: "=A1:A3+10"

  - id: range_plus_scalar_at_excluded_row
    description: "=A3:A8+10 at Z1: row 1 excluded; spill anchor reads A3+10=13"
    setup: { A3: 3, A4: 4, A5: 5 }
    formula: "=A3:A8+10"

  # -- Floating-point edges -----------------------------------------------
  - id: tiny_subnormal_arithmetic
    description: "1e-308 / 1e10 — denormals collapse to 0 in some IEEE configs"
    formula: "=1E-308/1E10"

  - id: very_large_minus_self_is_zero
    description: "1e15 - 1e15 = 0 cleanly"
    formula: "=1E15-1E15"
