suite: aggregate
description: SUM / AVERAGE / MIN / MAX / PRODUCT with direct args, ranges, and coercion edge cases
tolerance: { abs: 1.0e-12, rel: 1.0e-12 }
locale: ja-JP
cases:
  # -- SUM -----------------------------------------------------------------
  - id: sum_three_integers
    formula: "=SUM(1,2,3)"

  - id: sum_with_floats
    formula: "=SUM(1.5,2.5,3.0)"

  - id: sum_from_range
    setup: { A1: 10, A2: 20, A3: 30 }
    formula: "=SUM(A1:A3)"

  - id: sum_range_skips_text
    description: "Excel: SUM silently ignores text cells in a range"
    setup: { A1: 10, A2: "text", A3: 30 }
    formula: "=SUM(A1:A3)"

  - id: sum_range_skips_bool
    description: "Excel: SUM skips bool in range (BUT counts bool as direct arg)"
    setup: { A1: 10, A2: true, A3: 30 }
    formula: "=SUM(A1:A3)"

  - id: sum_direct_arg_bool_counted
    description: "Excel: TRUE as direct arg contributes 1"
    formula: "=SUM(10,TRUE,30)"

  - id: sum_range_with_error
    description: "Excel: an error inside a range propagates (#DIV/0! wins)"
    setup: { A1: 10, A2: "=1/0", A3: 30 }
    formula: "=SUM(A1:A3)"

  - id: sum_empty_range
    setup: {}
    formula: "=SUM(A1:A3)"

  - id: sum_mixed_direct_and_range
    setup: { A1: 10, A2: 20 }
    formula: "=SUM(A1:A2,30,40)"

  # -- AVERAGE -------------------------------------------------------------
  - id: average_three_integers
    formula: "=AVERAGE(2,4,6)"

  - id: average_from_range
    setup: { A1: 10, A2: 20, A3: 30 }
    formula: "=AVERAGE(A1:A3)"

  - id: average_range_skips_text
    description: "AVERAGE skips text — denominator drops to 2, not 3"
    setup: { A1: 10, A2: "text", A3: 30 }
    formula: "=AVERAGE(A1:A3)"

  - id: average_range_skips_bool
    setup: { A1: 10, A2: true, A3: 30 }
    formula: "=AVERAGE(A1:A3)"

  - id: average_empty_range_is_div0
    description: "AVERAGE of nothing -> #DIV/0!"
    setup: {}
    formula: "=AVERAGE(A1:A3)"

  - id: average_direct_arg_bool_counted
    description: "Direct-arg TRUE contributes value 1 and count 1: avg(10,1,30)=41/3"
    formula: "=AVERAGE(10,TRUE,30)"

  # -- MIN -----------------------------------------------------------------
  - id: min_three_integers
    formula: "=MIN(3,1,2)"

  - id: min_with_negative
    formula: "=MIN(-5,0,5)"

  - id: min_from_range
    setup: { A1: 30, A2: 10, A3: 20 }
    formula: "=MIN(A1:A3)"

  - id: min_range_skips_text_and_bool
    setup: { A1: 30, A2: "text", A3: true, "A4": 5 }
    formula: "=MIN(A1:A4)"

  - id: min_empty_range_is_zero
    description: "Excel: MIN / MAX of an empty range returns 0 (not #DIV/0!)"
    setup: {}
    formula: "=MIN(A1:A3)"

  # -- MAX -----------------------------------------------------------------
  - id: max_three_integers
    formula: "=MAX(3,1,2)"

  - id: max_with_negative
    formula: "=MAX(-5,-10,-1)"

  - id: max_from_range
    setup: { A1: 10, A2: 30, A3: 20 }
    formula: "=MAX(A1:A3)"

  - id: max_empty_range_is_zero
    setup: {}
    formula: "=MAX(A1:A3)"

  # -- PRODUCT -------------------------------------------------------------
  - id: product_three_integers
    formula: "=PRODUCT(2,3,4)"

  - id: product_with_zero
    formula: "=PRODUCT(2,0,5)"

  - id: product_from_range
    setup: { A1: 2, A2: 3, A3: 4 }
    formula: "=PRODUCT(A1:A3)"

  - id: product_empty_range_is_zero
    description: "Excel: PRODUCT of empty range returns 0"
    setup: {}
    formula: "=PRODUCT(A1:A3)"

  - id: product_range_skips_text
    setup: { A1: 2, A2: "text", A3: 4 }
    formula: "=PRODUCT(A1:A3)"
