suite: width
description: ASC / JIS / DBCS width-conversion functions for Japanese text (ja-JP)
tolerance: { abs: 0.0, rel: 0.0 }
locale: ja-JP
cases:
  # -- ASC: full-width ASCII -> half-width ASCII -----------------------------
  - id: asc_fullwidth_letter
    formula: "=ASC(\"Ａ\")"

  - id: asc_fullwidth_ascii_with_space
    description: "Full-width ASCII range plus ideographic space (U+3000)"
    formula: "=ASC(\"ＡＢＣ　１２３\")"

  # -- ASC: katakana decompose ---------------------------------------------
  - id: asc_voiced_ga
    description: "ガ decomposes into ｶ + dakuten (U+FF9E)"
    formula: "=ASC(\"ガ\")"

  - id: asc_semivoiced_row
    description: "Pa-row decomposes into base + handakuten (U+FF9F)"
    formula: "=ASC(\"パピプペポ\")"

  - id: asc_voiced_vu
    description: "ヴ decomposes into ｳ + dakuten"
    formula: "=ASC(\"ヴ\")"

  - id: asc_hiragana_passthrough
    description: "Hiragana is unchanged by ASC"
    formula: "=ASC(\"ひらがな\")"

  # -- JIS: ASCII -> full-width --------------------------------------------
  - id: jis_ascii_and_space
    description: "ASCII space (0x20) maps to U+3000; other ASCII via +0xFEE0"
    formula: "=JIS(\"ABC 123\")"

  # -- JIS: katakana recompose --------------------------------------------
  - id: jis_voiced_recompose
    description: "ｶ + dakuten recomposes to ガ"
    formula: "=JIS(\"ｶﾞ\")"

  - id: jis_semivoiced_row
    description: "ﾊ + handakuten etc. recomposes to パピプペポ"
    formula: "=JIS(\"ﾊﾟﾋﾟﾌﾟﾍﾟﾎﾟ\")"

  - id: jis_unvoiced_row
    description: "Plain half-width katakana row maps 1:1 to full-width"
    formula: "=JIS(\"ｱｲｳｴｵ\")"

  # -- DBCS is an alias of JIS --------------------------------------------
  - id: dbcs_alias_ascii
    description: "DBCS = JIS (both names point at the same impl)"
    formula: "=DBCS(\"ABC\")"

  # =========================================================================
  # Expanded probes: round-trips, mixed-content strings, kanji passthrough,
  # punctuation, error / blank coercion, idempotence.
  # =========================================================================

  # -- ASC round-trips ---------------------------------------------------
  - id: asc_jis_round_trip
    description: "JIS(ASC(...)) is identity for the canonical input set"
    formula: "=JIS(ASC(\"ＡＢＣ１２３\"))"

  - id: asc_idempotent_on_halfwidth
    description: "ASC of already-half-width is unchanged"
    formula: "=ASC(\"ABC123\")"

  - id: asc_idempotent_on_kanji
    description: "Kanji passes through ASC unchanged"
    formula: "=ASC(\"漢字\")"

  - id: asc_mixed_fullhalf
    description: "Mixed full-width and half-width ASCII"
    formula: "=ASC(\"ＡB Ｃd\")"

  - id: asc_with_kanji
    description: "Full-width ASCII surrounded by kanji"
    formula: "=ASC(\"漢ＡＢ字\")"

  - id: asc_punctuation
    description: "Full-width punctuation (！＠＃＄％)"
    formula: "=ASC(\"！＠＃＄％\")"

  - id: asc_yen_sign
    description: "Full-width yen ￥ — Excel may map to backslash or half-width"
    formula: "=ASC(\"￥\")"

  - id: asc_full_voiced_row
    description: "Full voiced ka-row ガギグゲゴ"
    formula: "=ASC(\"ガギグゲゴ\")"

  # -- JIS round-trips ---------------------------------------------------
  - id: jis_idempotent_on_fullwidth
    formula: "=JIS(\"ＡＢＣ\")"

  - id: jis_idempotent_on_kanji
    formula: "=JIS(\"漢字\")"

  - id: jis_mixed_halfkata_kanji
    description: "Half-width kata mixed with kanji"
    formula: "=JIS(\"漢ｱ字\")"

  - id: jis_orphan_dakuten
    description: "ﾞ alone (no preceding letter) — Excel may recompose or pass-through"
    formula: "=JIS(\"ﾞ\")"

  - id: jis_half_punctuation
    description: "Half-width punctuation (!@#$%)"
    formula: "=JIS(\"!@#$%\")"

  - id: jis_round_trip
    description: "ASC(JIS(...)) is identity for the canonical full-width input"
    formula: "=ASC(JIS(\"ABC123\"))"

  # -- DBCS / JIS equivalence -------------------------------------------
  # Mac Excel 16.108.1 ja-JP returns #NAME? for every JIS call (verified
  # 2026-04-26 via tests/oracle/cases/jis_recheck.yaml during probe). The
  # JIS-named cases above are therefore skip-oracle in tests/divergence.yaml.
  # Formulon registers JIS and DBCS to the same internal Jis() (see
  # src/eval/builtins/text_width.cpp:466-467), so the DBCS mirrors below
  # provide a Mac-verified parity oracle for the impl. Whenever a new JIS
  # case is added above, add the corresponding dbcs_* mirror here so the
  # underlying conversion stays verified against Mac.
  - id: dbcs_voiced_recompose
    description: "DBCS recomposes ｶﾞ → ガ same as JIS"
    formula: "=DBCS(\"ｶﾞ\")"

  - id: dbcs_kanji_passthrough
    formula: "=DBCS(\"漢字\")"

  - id: dbcs_ascii_and_space
    description: "DBCS mirror of jis_ascii_and_space (Mac-verified parity)"
    formula: "=DBCS(\"ABC 123\")"

  - id: dbcs_semivoiced_row
    description: "DBCS mirror of jis_semivoiced_row"
    formula: "=DBCS(\"ﾊﾟﾋﾟﾌﾟﾍﾟﾎﾟ\")"

  - id: dbcs_unvoiced_row
    description: "DBCS mirror of jis_unvoiced_row"
    formula: "=DBCS(\"ｱｲｳｴｵ\")"

  - id: dbcs_idempotent_on_fullwidth
    description: "DBCS mirror of jis_idempotent_on_fullwidth"
    formula: "=DBCS(\"ＡＢＣ\")"

  - id: dbcs_idempotent_on_kanji
    description: "DBCS mirror of jis_idempotent_on_kanji"
    formula: "=DBCS(\"漢字\")"

  - id: dbcs_mixed_halfkata_kanji
    description: "DBCS mirror of jis_mixed_halfkata_kanji"
    formula: "=DBCS(\"漢ｱ字\")"

  - id: dbcs_orphan_dakuten
    description: "DBCS mirror of jis_orphan_dakuten"
    formula: "=DBCS(\"ﾞ\")"

  - id: dbcs_half_punctuation
    description: "DBCS mirror of jis_half_punctuation"
    formula: "=DBCS(\"!@#$%\")"

  - id: dbcs_round_trip
    description: "DBCS mirror of jis_round_trip — ASC(DBCS(...)) is identity"
    formula: "=ASC(DBCS(\"ABC123\"))"

  - id: dbcs_asc_round_trip
    description: "DBCS mirror of asc_jis_round_trip — DBCS(ASC(...)) is identity"
    formula: "=DBCS(ASC(\"ＡＢＣ１２３\"))"

  - id: dbcs_bool_coerces
    description: "DBCS mirror of jis_bool_coerces"
    formula: "=DBCS(TRUE)"

  - id: dbcs_error_propagates
    description: "DBCS mirror of jis_error_propagates"
    formula: "=DBCS(#DIV/0!)"

  - id: dbcs_long_halfkana_string
    description: "DBCS mirror of jis_long_halfkana_string"
    formula: "=DBCS(\"ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ\")"

  # Empty-string / blank-cell probes omitted — xlwings cannot write the
  # empty string into a setup cell (it lands as genuinely blank), so the
  # oracle cannot probe the text("") vs blank distinction in ASC / JIS.

  # -- Number / bool coercion --------------------------------------------
  - id: asc_number_coerces_to_text
    description: "ASC(123) coerces 123 to text \"123\" first"
    formula: "=ASC(123)"

  - id: jis_bool_coerces
    description: "JIS(TRUE) coerces to text \"TRUE\" then converts"
    formula: "=JIS(TRUE)"

  # -- Error propagation -----------------------------------------------
  - id: asc_error_propagates
    formula: "=ASC(#REF!)"

  - id: jis_error_propagates
    formula: "=JIS(#DIV/0!)"

  # -- Long string ------------------------------------------------------
  - id: asc_long_kana_string
    description: "Whole katakana table"
    formula: "=ASC(\"アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン\")"

  - id: jis_long_halfkana_string
    formula: "=JIS(\"ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ\")"
