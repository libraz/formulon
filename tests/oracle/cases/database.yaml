      E2: 0
    formula: "=DSUM(A1:C5, \"Sales\", E1:E2)"

  # -- Case sensitivity ---------------------------------------------------
  - id: dsum_lowercase_apple
    description: "Lowercase apple should match Apple/Apple in Excel (case-insensitive)"
    setup:
      A1: Fruit
      B1: Region
      C1: Sales
      A2: Apple
      B2: East
      C2: 100
      A3: Apple
      B3: West
      C3: 200
      A4: Pear
      B4: East
      C4: 50
      A5: Banana
      B5: West
      C5: 300
      E1: Fruit
      E2: apple
    formula: "=DSUM(A1:C5, \"Sales\", E1:E2)"

  - id: dsum_uppercase_apple
    description: "Uppercase APPLE matches Apple/Apple (case-insensitive) -> 300"
    setup:
      A1: Fruit
      B1: Region
      C1: Sales
      A2: Apple
      B2: East
      C2: 100
      A3: Apple
      B3: West
      C3: 200
      A4: Pear
      B4: East
      C4: 50
      A5: Banana
      B5: West
      C5: 300
      E1: Fruit
      E2: APPLE
    formula: "=DSUM(A1:C5, \"Sales\", E1:E2)"

