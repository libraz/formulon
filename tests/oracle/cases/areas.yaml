suite: areas
description: |
  AREAS(reference) — counts the number of disjoint rectangular areas in a
  reference argument. Formulon answers from AST shape (Ref / RangeOp / UnionOp);
  Mac Excel evaluates the reference at runtime and so handles INDIRECT /
  OFFSET / CHOOSE / intersection-operator inputs that Formulon's structural
  walk cannot. This suite captures both the structural agreement cases and
  the runtime-only cases as oracle probes; any divergence will surface in
  `oracle-verify` and either drives a Formulon fix or a divergence.yaml entry.
tolerance: { abs: 0, rel: 0 }
locale: ja-JP
cases:
  # -- Single Ref ----------------------------------------------------------
  - id: single_cell
    formula: "=AREAS(A1)"
    expect: { kind: number, value: 1 }

  - id: single_cell_with_value
    setup: { A1: 42 }
    formula: "=AREAS(A1)"
    expect: { kind: number, value: 1 }

  - id: single_cell_absolute
    formula: "=AREAS($A$1)"
    expect: { kind: number, value: 1 }

  # -- RangeOp -------------------------------------------------------------
  - id: rectangle_range
    formula: "=AREAS(A1:B2)"
    expect: { kind: number, value: 1 }

  - id: degenerate_single_cell_range
    formula: "=AREAS(A1:A1)"
    expect: { kind: number, value: 1 }

  - id: row_slice
    formula: "=AREAS(A1:E1)"
    expect: { kind: number, value: 1 }

  - id: column_slice
    formula: "=AREAS(A1:A10)"
    expect: { kind: number, value: 1 }

  - id: whole_column
    formula: "=AREAS(A:A)"
    expect: { kind: number, value: 1 }

  - id: whole_column_multi
    formula: "=AREAS(A:C)"
    expect: { kind: number, value: 1 }

  - id: whole_row
    formula: "=AREAS(1:1)"
    expect: { kind: number, value: 1 }

  - id: whole_row_multi
    formula: "=AREAS(1:3)"
    expect: { kind: number, value: 1 }

  # -- UnionOp (parenthesised comma list) ---------------------------------
  - id: union_two_cells
    formula: "=AREAS((A1,B2))"
    expect: { kind: number, value: 2 }

  - id: union_two_ranges
    formula: "=AREAS((A1:B2,C3:D4))"
    expect: { kind: number, value: 2 }

  - id: union_three_areas
    formula: "=AREAS((A1,B2,C3))"
    expect: { kind: number, value: 3 }

  - id: union_mixed_kinds
    description: "Cell + rectangle + whole column in one union"
    formula: "=AREAS((A1,B2:C3,D:D))"
    expect: { kind: number, value: 3 }

  - id: union_overlapping_ranges
    description: "Overlap is not deduplicated; structural count only"
    formula: "=AREAS((A1:C3,B2:D4))"
    expect: { kind: number, value: 2 }

  - id: union_five_cells
    formula: "=AREAS((A1,B1,C1,D1,E1))"
    expect: { kind: number, value: 5 }

  # -- Nested unions -------------------------------------------------------
  - id: union_nested_pair
    description: "Excel flattens nested parens; AREAS still reports leaf count"
    formula: "=AREAS(((A1,B2),(C3,D4)))"
    expect: { kind: number, value: 4 }

  - id: union_singleton_paren
    description: "Outer parens around a single ref should be a no-op"
    formula: "=AREAS((A1:B2))"
    expect: { kind: number, value: 1 }

  # NOTE: arity errors (`=AREAS()`, `=AREAS(A1,B2)`) and non-reference
  # literal args (`=AREAS(1)`, `=AREAS("A1")`, `=AREAS(TRUE)`,
  # `=AREAS(1+1)`) were probed but Excel rejects them at formula entry,
  # leaving the cell blank rather than evaluating to an error. Those
  # cases cannot be oracle-tested through xlwings and were removed from
  # this suite. Formulon's parser-strictness story is tracked separately.

  # -- Reference-returning functions (likely Formulon-vs-Excel divergence) ---
  - id: arg_indirect_resolved
    description: |
      Excel: INDIRECT resolves to a 1-area ref → 1. Formulon: count_areas
      sees a Call node and returns #VALUE!. Captured to expose the gap.
    formula: "=AREAS(INDIRECT(\"A1\"))"
    expect: { kind: number, value: 1 }

  - id: arg_offset_resolved
    description: "OFFSET returns a runtime reference Excel can count; Formulon's AST walk cannot."
    formula: "=AREAS(OFFSET(A1,1,1))"
    expect: { kind: number, value: 1 }

  - id: arg_choose_returns_reference
    description: "CHOOSE can return a reference at runtime; Formulon does not see through it."
    formula: "=AREAS(CHOOSE(1,A1:B2,C3:D4))"
    expect: { kind: number, value: 1 }

  - id: arg_if_returns_reference
    description: "IF returning a reference is a runtime-only union; AST walk gives #VALUE!."
    formula: "=AREAS(IF(TRUE,A1:B2,C3:D4))"
    expect: { kind: number, value: 1 }

  # -- Intersection operator (space) --------------------------------------
  - id: arg_intersection_operator
    description: |
      Excel: A1:C3 ∩ B2:D4 is a single area (B2:C3) → 1. Formulon's
      count_areas does not handle IntersectOp → #VALUE!.
    formula: "=AREAS(A1:C3 B2:D4)"
    expect: { kind: number, value: 1 }

  - id: arg_intersection_disjoint
    description: |
      Disjoint operands intersect to nothing — Excel returns #NULL!.
      Formulon: still rejects shape → #VALUE!. Documents the error-class
      divergence in addition to the value divergence.
    formula: "=AREAS(A1:B2 C3:D4)"
    expect: { kind: error, code: "#NULL!" }

  # -- Error propagation ---------------------------------------------------
  - id: error_in_arg_div0
    description: "An evaluable error inside an arg should not bubble; AREAS is structural."
    setup: { A1: "=1/0" }
    formula: "=AREAS(A1)"
    expect: { kind: number, value: 1 }
