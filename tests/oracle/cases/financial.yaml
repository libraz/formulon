suite: financial
description: PV / FV / PMT / NPER / NPV / IRR / RATE / IPMT / PPMT / CUMIPMT / CUMPRINC / SLN / SYD / DDB / DB — time-value-of-money and depreciation builtins
# Mac xlwings returns some Excel-computed floats as their displayed value
# (about 4 decimal digits) rather than the underlying double, so we cannot
# verify to full double precision from this oracle. 1e-3 comfortably covers
# the display-rounding error on PMT / NPV / PV / FV while still catching
# any real formula divergence (the magnitudes here are hundreds to tens of
# thousands, so the relative precision remains strict).
tolerance: { abs: 1.0e-3, rel: 1.0e-6 }
locale: ja-JP
cases:
  # -- PV ------------------------------------------------------------------
  - id: pv_basic
    description: "5-year car loan PV: =PV(0.05/12, 60, -500) ~ 26495.35"
    formula: "=PV(0.05/12, 60, -500)"

  - id: pv_zero_rate
    description: "rate=0: PV = -(pmt*nper + fv) = 30000"
    formula: "=PV(0, 60, -500)"

  - id: pv_with_fv
    description: "PV with non-zero future value"
    formula: "=PV(0.05/12, 60, -500, -10000)"

  - id: pv_type_1
    description: "Annuity-due: type=1 shifts cash flows forward one period"
    formula: "=PV(0.05/12, 60, -500, 0, 1)"

  # -- FV ------------------------------------------------------------------
  - id: fv_basic
    description: "10-year monthly deposit at 8%"
    formula: "=FV(0.08/12, 120, -200)"

  - id: fv_zero_rate
    description: "rate=0: FV = -(pv + pmt*nper) = 30000"
    formula: "=FV(0, 60, -500)"

  - id: fv_with_pv
    description: "FV with non-zero present value (combining loan and monthly deposit)"
    formula: "=FV(0.05/12, 60, -500, -10000)"

  # -- PMT -----------------------------------------------------------------
  - id: pmt_basic
    description: "Car loan payment: =PMT(0.05/12, 60, 25000) negative"
    formula: "=PMT(0.05/12, 60, 25000)"

  - id: pmt_zero_rate
    description: "rate=0: PMT = -(pv+fv)/nper"
    formula: "=PMT(0, 60, 25000)"

  - id: pmt_type_1
    description: "Annuity-due payment (smaller magnitude than end-of-period)"
    formula: "=PMT(0.05/12, 60, 25000, 0, 1)"

  # -- NPER ----------------------------------------------------------------
  - id: nper_basic
    description: "=NPER(0.05/12, -500, 25000) ~ 56.18 periods"
    formula: "=NPER(0.05/12, -500, 25000)"

  - id: nper_zero_rate
    description: "rate=0: NPER = -(pv+fv)/pmt"
    formula: "=NPER(0, -500, 25000)"

  - id: nper_sign_mismatch_negative
    description: |
      Both pmt and pv positive: Excel 365 Mac returns the raw algebraic
      answer (a negative NPER), not #NUM! as older references suggest.
    formula: "=NPER(0.05/12, 500, 25000)"

  # -- NPV -----------------------------------------------------------------
  - id: npv_basic_scalars
    description: "NPV across flat scalar args"
    formula: "=NPV(0.1, 100, 200, 300)"

  - id: npv_from_range
    description: "NPV with a range argument (values flattened row-major)"
    setup: { A1: 100, A2: 200, A3: 300 }
    formula: "=NPV(0.1, A1:A3)"

  - id: npv_mixed_scalar_and_range
    description: "NPV with mixed scalar and range args; positional index runs across concatenated sequence"
    setup: { A1: 100, A2: 200 }
    formula: "=NPV(0.1, 50, A1:A2, 300)"

  - id: npv_zero_rate
    description: "rate=0 reduces NPV to the sum"
    formula: "=NPV(0, 100, 200, 300)"

  # -- IRR -----------------------------------------------------------------
  - id: irr_basic
    description: "Classic IRR: -1000 then 300, 400, 500 over 3 periods"
    setup: { A1: -1000, A2: 300, A3: 400, A4: 500 }
    formula: "=IRR(A1:A4)"

  - id: irr_with_guess
    description: "Same IRR with an explicit starting guess"
    setup: { A1: -1000, A2: 300, A3: 400, A4: 500 }
    formula: "=IRR(A1:A4, 0.1)"

  - id: irr_all_positive_is_num
    description: "No sign change in cash flows -> #NUM!"
    setup: { A1: 100, A2: 200, A3: 300 }
    formula: "=IRR(A1:A3)"

  - id: irr_all_negative_is_num
    description: "All-negative cash flows -> #NUM!"
    setup: { A1: -100, A2: -200, A3: -300 }
    formula: "=IRR(A1:A3)"

  - id: irr_array_literal
    description: "Inline array literal used as IRR cash-flow source"
    formula: "=IRR({-1000,300,400,500})"

  # -- RATE ----------------------------------------------------------------
  - id: rate_basic
    description: "Car loan RATE: solve for monthly rate given pmt/pv"
    formula: "=RATE(60, -500, 25000)"

  - id: rate_zero_outcome
    description: "Symmetric setup pv+pmt*nper+fv=0 yields rate=0 exactly"
    formula: "=RATE(10, -100, 1000)"

  - id: rate_with_fv
    description: "RATE with non-zero future value changes the convergence point"
    formula: "=RATE(60, -500, 25000, -5000)"

  - id: rate_type_1
    description: "Annuity-due (type=1) yields a different rate from ordinary annuity"
    formula: "=RATE(60, -500, 25000, 0, 1)"

  - id: rate_guess_custom
    description: "Same setup as rate_basic but with an explicit starting guess"
    formula: "=RATE(60, -500, 25000, 0, 0, 0.05)"

  - id: rate_no_solution_is_num
    description: |
      Both pmt and pv positive: no real positive rate amortises a
      positive balance with positive payments. Excel may return a
      negative rate or #NUM!; let the oracle decide.
    formula: "=RATE(60, 500, 25000)"

  # -- IPMT ----------------------------------------------------------------
  - id: ipmt_first_period
    description: "First-period interest dominates: ~-104.17 for 25k loan at 5%/12"
    formula: "=IPMT(0.05/12, 1, 60, 25000)"

  - id: ipmt_last_period
    description: "Final-period interest is small (most of payment is principal)"
    formula: "=IPMT(0.05/12, 60, 60, 25000)"

  - id: ipmt_per_out_of_range_is_num
    description: "per > nper -> #NUM!"
    formula: "=IPMT(0.05/12, 61, 60, 25000)"

  - id: ipmt_type_1_first_period_is_zero
    description: "Annuity-due first-period interest is exactly 0"
    formula: "=IPMT(0.05/12, 1, 60, 25000, 0, 1)"

  - id: ipmt_zero_rate_is_zero
    description: "rate=0 -> IPMT=0 for any period"
    formula: "=IPMT(0, 5, 60, 25000)"

  # -- PPMT ----------------------------------------------------------------
  - id: ppmt_first_period
    description: "First-period principal is small relative to IPMT"
    formula: "=PPMT(0.05/12, 1, 60, 25000)"

  - id: ppmt_last_period
    description: "Final-period principal is nearly the full payment"
    formula: "=PPMT(0.05/12, 60, 60, 25000)"

  - id: ipmt_plus_ppmt_equals_pmt
    description: |
      Identity: IPMT(i) + PPMT(i) - PMT = 0 for any period i in range.
      Authored as an algebraic difference so the oracle is verifying zero.
    formula: "=IPMT(0.05/12,5,60,25000) + PPMT(0.05/12,5,60,25000) - PMT(0.05/12,60,25000)"

  # -- CUMIPMT -------------------------------------------------------------
  - id: cumipmt_full_range
    description: "Total interest over 5 years on a 25k loan at 5%/12"
    formula: "=CUMIPMT(0.05/12, 60, 25000, 1, 60, 0)"

  - id: cumipmt_first_year
    description: "Interest paid during the first 12 periods"
    formula: "=CUMIPMT(0.05/12, 60, 25000, 1, 12, 0)"

  - id: cumipmt_start_out_of_range_is_num
    description: "start_period < 1 -> #NUM!"
    formula: "=CUMIPMT(0.05/12, 60, 25000, 0, 12, 0)"

  - id: cumipmt_reversed_range_is_num
    description: "start > end -> #NUM!"
    formula: "=CUMIPMT(0.05/12, 60, 25000, 24, 12, 0)"

  # -- CUMPRINC ------------------------------------------------------------
  - id: cumprinc_full_range
    description: "Total principal paid equals -pv (loan fully amortised)"
    formula: "=CUMPRINC(0.05/12, 60, 25000, 1, 60, 0)"

  - id: cumprinc_plus_cumipmt_eq_total_payments
    description: |
      Identity: CUMPRINC + CUMIPMT - PMT*nper = 0 over the full range.
      Authored as an algebraic difference so the oracle verifies zero.
    formula: "=CUMPRINC(0.05/12, 60, 25000, 1, 60, 0) + CUMIPMT(0.05/12, 60, 25000, 1, 60, 0) - PMT(0.05/12, 60, 25000)*60"

  # -- SLN -----------------------------------------------------------------
  - id: sln_basic
    description: "Straight-line: (10000-1000)/5 = 1800 per period"
    formula: "=SLN(10000, 1000, 5)"

  - id: sln_zero_salvage
    description: "Zero salvage: full cost over 10 periods = 1000 per period"
    formula: "=SLN(10000, 0, 10)"

  - id: sln_life_zero_is_div0
    description: "life == 0 -> #DIV/0!"
    formula: "=SLN(10000, 1000, 0)"

  - id: sln_negative_life_is_num
    description: |
      Oracle-verified: Excel 365 Mac returns the raw algebraic answer
      (-1800 here), not #NUM!. Case id retained for history.
    formula: "=SLN(10000, 1000, -5)"

  # -- SYD -----------------------------------------------------------------
  - id: syd_first_period
    description: "Sum-of-years-digits period 1: (9000)*5*2/(5*6) = 3000"
    formula: "=SYD(10000, 1000, 5, 1)"

  - id: syd_last_period
    description: "SYD period 5: (9000)*1*2/(5*6) = 600"
    formula: "=SYD(10000, 1000, 5, 5)"

  - id: syd_sum_equals_depreciable_base
    description: |
      Identity: sum of SYD across all periods equals cost - salvage
      (9000). Authored as a single formula so the oracle verifies the
      total directly.
    formula: "=SYD(10000,1000,5,1)+SYD(10000,1000,5,2)+SYD(10000,1000,5,3)+SYD(10000,1000,5,4)+SYD(10000,1000,5,5)"

  - id: syd_period_out_of_range_is_num
    description: "period > life -> #NUM!"
    formula: "=SYD(10000, 1000, 5, 6)"

  # -- DDB -----------------------------------------------------------------
  - id: ddb_first_period
    description: "Double-declining first period: 10000 * 2/5 = 4000"
    formula: "=DDB(10000, 1000, 5, 1)"

  - id: ddb_second_period
    description: "DDB period 2: (10000-4000)*0.4 = 2400"
    formula: "=DDB(10000, 1000, 5, 2)"

  - id: ddb_last_period_with_salvage_floor
    description: |
      DDB final period for cost=10000/salvage=1000/life=5: book value
      after period 4 is 1296; period-5 rate-based charge (518.4) would
      overshoot salvage, so the floor caps dep_5 to book - salvage = 296.
    formula: "=DDB(10000, 1000, 5, 5)"

  - id: ddb_custom_factor
    description: "factor=3 triples the rate: 10000 * 3/5 = 6000 in period 1"
    formula: "=DDB(10000, 1000, 5, 1, 3)"

  - id: ddb_period_out_of_range_is_num
    description: "period > life -> #NUM!"
    formula: "=DDB(10000, 1000, 5, 6)"

  # -- DB ------------------------------------------------------------------
  - id: db_full_year_first_period
    description: |
      Fixed-rate declining balance, full-year month=12. rate = round(1 -
      (1000/10000)^(1/5), 3) = 0.369; dep_1 = 10000 * 0.369 = 3690.
    formula: "=DB(10000, 1000, 5, 1)"

  - id: db_full_year_last_period
    description: "DB period 5: residual charge after 4 periods at rate=0.369"
    formula: "=DB(10000, 1000, 5, 5)"

  - id: db_partial_first_year
    description: |
      month=6 prorates the first year: dep_1 = 10000 * 0.369 * 6/12 =
      1845.
    formula: "=DB(10000, 1000, 5, 1, 6)"

  - id: db_period_life_plus_one_with_partial
    description: |
      Partial first year (month=6) leaves a partial last year at period
      life+1 = 6; formula yields the remaining-book * rate * (12-6)/12.
    formula: "=DB(10000, 1000, 5, 6, 6)"

  - id: db_invalid_month_is_num
    description: "month > 12 -> #NUM!"
    formula: "=DB(10000, 1000, 5, 1, 13)"
