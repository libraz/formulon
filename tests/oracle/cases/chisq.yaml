suite: chisq
description: CHISQ.DIST / CHISQ.DIST.RT / CHISQ.INV / CHISQ.INV.RT — chi-squared distribution family
# xlwings returns Excel-computed floats as their displayed value (typically
# ~15 digits but with some tail-digit truncation). Chi-squared quantiles
# sit between ~0 and ~25 for the cases exercised here, and CDFs span the
# full [0, 1] range; 1e-6 absolute / relative tolerances comfortably
# absorb display-rounding artefacts while still catching real divergence.
tolerance: { abs: 1.0e-6, rel: 1.0e-6 }
locale: ja-JP
cases:
  # -- CHISQ.DIST ----------------------------------------------------------
  - id: chisq_dist_cdf_5_4df
    description: "CDF of chi-squared(df=4) at x=5 ~ 0.712703"
    formula: "=CHISQ.DIST(5, 4, TRUE)"

  - id: chisq_dist_pdf_5_4df
    description: "PDF of chi-squared(df=4) at x=5 ~ 0.102626"
    formula: "=CHISQ.DIST(5, 4, FALSE)"

  - id: chisq_dist_cdf_0
    description: "CDF at x=0 is 0 for any df"
    formula: "=CHISQ.DIST(0, 4, TRUE)"

  - id: chisq_dist_pdf_df2_x0
    description: "PDF at x=0 with df=2 is exactly 0.5 (exponential rate 1/2)"
    formula: "=CHISQ.DIST(0, 2, FALSE)"

  - id: chisq_dist_cdf_large_x
    description: "CDF at x=100 with df=10 ~ 1"
    formula: "=CHISQ.DIST(100, 10, TRUE)"

  - id: chisq_dist_negative_x_is_num
    description: "x < 0 yields #NUM!"
    formula: "=CHISQ.DIST(-1, 4, TRUE)"

  - id: chisq_dist_df_zero_is_num
    description: "df < 1 yields #NUM!"
    formula: "=CHISQ.DIST(5, 0, TRUE)"

  - id: chisq_dist_pdf_df1_x0_is_num
    description: "PDF at x=0 with df=1 diverges; Excel surfaces #NUM!"
    formula: "=CHISQ.DIST(0, 1, FALSE)"

  # -- CHISQ.DIST.RT -------------------------------------------------------
  - id: chisq_dist_rt_basic
    description: "Right-tailed CDF of chi-squared(df=4) at 5 ~ 0.287297"
    formula: "=CHISQ.DIST.RT(5, 4)"

  - id: chisq_dist_rt_plus_dist_is_1
    description: "CHISQ.DIST(..., TRUE) + CHISQ.DIST.RT == 1"
    formula: "=CHISQ.DIST(5, 4, TRUE) + CHISQ.DIST.RT(5, 4)"

  # -- CHISQ.INV -----------------------------------------------------------
  - id: chisq_inv_95pct_4df
    description: "95th percentile of chi-squared(df=4) ~ 9.48773"
    formula: "=CHISQ.INV(0.95, 4)"

  - id: chisq_inv_half_4df
    description: "Median of chi-squared(df=4) ~ 3.35669"
    formula: "=CHISQ.INV(0.5, 4)"

  - id: chisq_inv_round_trip
    description: "CHISQ.INV(CHISQ.DIST(5, 4, TRUE), 4) should equal 5 to tolerance"
    formula: "=CHISQ.INV(CHISQ.DIST(5, 4, TRUE), 4) - 5"

  - id: chisq_inv_p_zero
    description: "CHISQ.INV(0, df) = 0 (mass on the left boundary)"
    formula: "=CHISQ.INV(0, 4)"

  - id: chisq_inv_p_one_is_num
    description: "CHISQ.INV(1, df) diverges; Excel surfaces #NUM!"
    formula: "=CHISQ.INV(1, 4)"

  # -- CHISQ.INV.RT --------------------------------------------------------
  - id: chisq_inv_rt_5pct_4df
    description: "CHISQ.INV.RT(0.05, 4) == CHISQ.INV(0.95, 4) ~ 9.48773"
    formula: "=CHISQ.INV.RT(0.05, 4)"

  - id: chisq_inv_rt_round_trip
    description: "CHISQ.INV.RT(CHISQ.DIST.RT(5, 4), 4) should equal 5 to tolerance"
    formula: "=CHISQ.INV.RT(CHISQ.DIST.RT(5, 4), 4) - 5"

  # =========================================================================
  # Expanded probes: small / large df, fractional truncation, p boundary
  # edges, error inputs, complement symmetry, very-large x asymptotes.
  # =========================================================================

  # -- CHISQ.DIST: small / large df ---------------------------------------
  - id: chisq_dist_df_one_pdf_at_one
    description: "df=1 PDF at x=1 — sharp peak"
    formula: "=CHISQ.DIST(1, 1, FALSE)"

  - id: chisq_dist_df_huge_normal_like
    description: "df=10000 — by CLT, chi-sq approaches a shifted normal"
    formula: "=CHISQ.DIST(10000, 10000, TRUE)"

  - id: chisq_dist_fractional_df_truncates
    description: "df=4.7 truncates to 4 — Excel allows fractional df for chi-squared"
    formula: "=CHISQ.DIST(5, 4.7, TRUE)"

  - id: chisq_dist_fractional_df_at_1_5
    description: "df=1.5 — chi-squared accepts non-integer df"
    formula: "=CHISQ.DIST(2, 1.5, TRUE)"

  # -- CHISQ.DIST.RT: edges -----------------------------------------------
  - id: chisq_dist_rt_at_zero
    description: "Right-tail at x=0 is 1.0"
    formula: "=CHISQ.DIST.RT(0, 4)"

  - id: chisq_dist_rt_negative_x_is_num
    formula: "=CHISQ.DIST.RT(-1, 4)"

  - id: chisq_dist_rt_huge_x
    description: "Right-tail at very large x — vanishingly small probability"
    formula: "=CHISQ.DIST.RT(100, 4)"

  - id: chisq_dist_rt_zero_df_is_num
    formula: "=CHISQ.DIST.RT(5, 0)"

  - id: chisq_dist_rt_negative_df_is_num
    formula: "=CHISQ.DIST.RT(5, -4)"

  # -- CHISQ.INV: edges --------------------------------------------------
  - id: chisq_inv_p_just_below_one
    description: "p=0.999 — far-tail quantile"
    formula: "=CHISQ.INV(0.999, 4)"

  - id: chisq_inv_p_negative_is_num
    formula: "=CHISQ.INV(-0.1, 4)"

  - id: chisq_inv_p_above_one_is_num
    formula: "=CHISQ.INV(1.5, 4)"

  - id: chisq_inv_zero_df_is_num
    formula: "=CHISQ.INV(0.5, 0)"

  - id: chisq_inv_negative_df_is_num
    formula: "=CHISQ.INV(0.5, -4)"

  - id: chisq_inv_fractional_df_truncates
    formula: "=CHISQ.INV(0.5, 4.7)"

  # -- CHISQ.INV.RT: edges ----------------------------------------------
  - id: chisq_inv_rt_p_zero
    description: "CHISQ.INV.RT(0, df) — right-tail of 0 is +Inf or #NUM!"
    formula: "=CHISQ.INV.RT(0, 4)"

  - id: chisq_inv_rt_p_one
    description: "CHISQ.INV.RT(1, df) -> 0"
    formula: "=CHISQ.INV.RT(1, 4)"

  - id: chisq_inv_rt_p_negative_is_num
    formula: "=CHISQ.INV.RT(-0.1, 4)"

  - id: chisq_inv_rt_p_above_one_is_num
    formula: "=CHISQ.INV.RT(1.5, 4)"

  # -- Complement symmetry ----------------------------------------------
  - id: chisq_inv_complement_symmetry
    description: "CHISQ.INV(0.95) == CHISQ.INV.RT(0.05)"
    formula: "=CHISQ.INV(0.95, 4) - CHISQ.INV.RT(0.05, 4)"

  # -- PDF at boundary ---------------------------------------------------
  - id: chisq_dist_pdf_df_one_at_x_one
    formula: "=CHISQ.DIST(1, 1, FALSE)"

  - id: chisq_dist_pdf_df3_x0
    description: "PDF at x=0 with df=3 — value is 0 (chi-squared with df>=2 has zero density at zero)"
    formula: "=CHISQ.DIST(0, 3, FALSE)"
