suite: text
description: LEN / LEFT / RIGHT / MID / CONCAT / EXACT / FIND / SEARCH / UPPER / LOWER / PROPER / TRIM / CLEAN / SUBSTITUTE / REPT / TEXTJOIN / UNICHAR / UNICODE
tolerance: { abs: 0.0, rel: 0.0 }
locale: ja-JP
cases:
  # -- LEN (UTF-16 unit count) --------------------------------------------
  - id: len_ascii
    formula: "=LEN(\"hello\")"

  - id: len_empty_string
    formula: "=LEN(\"\")"

  - id: len_bmp_japanese
    description: "Each BMP hiragana is 1 UTF-16 unit (so LEN = 3)"
    formula: "=LEN(\"あいう\")"

  - id: len_mixed
    formula: "=LEN(\"abcあいう\")"

  - id: len_coerces_number
    description: "LEN coerces numbers to shortest-text form first"
    formula: "=LEN(123)"

  - id: len_coerces_bool
    formula: "=LEN(TRUE)"

  # -- LEFT / RIGHT / MID --------------------------------------------------
  - id: left_first_three
    formula: "=LEFT(\"abcdef\",3)"

  - id: left_default_count
    description: "Excel: LEFT without count defaults to 1"
    formula: "=LEFT(\"abcdef\")"

  - id: left_more_than_length
    description: "Excel: asking for more chars than available returns full string"
    formula: "=LEFT(\"ab\",10)"

  - id: left_zero_count
    formula: "=LEFT(\"abcdef\",0)"

  - id: left_negative_is_value
    formula: "=LEFT(\"abcdef\",-1)"

  - id: right_last_three
    formula: "=RIGHT(\"abcdef\",3)"

  - id: right_default_count
    formula: "=RIGHT(\"abcdef\")"

  - id: mid_middle
    formula: "=MID(\"abcdef\",2,3)"

  - id: mid_start_beyond_length
    description: "Excel: start > length yields empty string"
    formula: "=MID(\"ab\",10,3)"

  - id: mid_zero_length
    formula: "=MID(\"abcdef\",2,0)"

  - id: mid_start_zero_is_value
    description: "Excel: MID(...,0,n) -> #VALUE! (start is 1-based)"
    formula: "=MID(\"abcdef\",0,3)"

  # -- CONCAT / CONCATENATE ------------------------------------------------
  - id: concat_two_strings
    formula: "=CONCAT(\"a\",\"b\")"

  - id: concat_many_mixed
    formula: "=CONCAT(\"a\",1,TRUE)"

  - id: concatenate_two_strings
    formula: "=CONCATENATE(\"x\",\"y\")"

  # -- EXACT ---------------------------------------------------------------
  - id: exact_same
    formula: "=EXACT(\"abc\",\"abc\")"

  - id: exact_different_case
    description: "EXACT is case-SENSITIVE (unlike =)"
    formula: "=EXACT(\"ABC\",\"abc\")"

  - id: exact_number_vs_text_number
    description: "EXACT coerces: 1 vs \"1\" -> TRUE"
    formula: "=EXACT(1,\"1\")"

  # -- FIND / SEARCH -------------------------------------------------------
  - id: find_substring
    formula: "=FIND(\"c\",\"abcdef\")"

  - id: find_not_found_is_value
    formula: "=FIND(\"z\",\"abcdef\")"

  - id: find_case_sensitive
    description: "FIND is case-sensitive; no match -> #VALUE!"
    formula: "=FIND(\"A\",\"abc\")"

  - id: find_with_start
    formula: "=FIND(\"a\",\"abcabc\",2)"

  - id: search_substring
    description: "SEARCH is case-INSENSITIVE"
    formula: "=SEARCH(\"C\",\"abcdef\")"

  - id: search_wildcard_q
    description: "SEARCH supports ? wildcard; FIND does not"
    formula: "=SEARCH(\"a?c\",\"zabcabc\")"

  - id: search_wildcard_star
    formula: "=SEARCH(\"a*c\",\"zabbbbc\")"

  # -- UPPER / LOWER / PROPER / TRIM / CLEAN -----------------------------
  - id: upper_ascii
    formula: "=UPPER(\"hello\")"

  - id: lower_ascii
    formula: "=LOWER(\"HELLO\")"

  - id: proper_multiword
    description: "PROPER capitalises each word"
    formula: "=PROPER(\"hello world\")"

  - id: trim_leading_trailing
    description: "Excel TRIM removes leading/trailing/repeated internal spaces"
    formula: "=TRIM(\"  hello   world  \")"

  - id: clean_removes_ctrl
    description: "CLEAN strips non-printable chars (< 32)"
    formula: "=CLEAN(\"ab	cd\")"

  # -- SUBSTITUTE ----------------------------------------------------------
  - id: substitute_all
    formula: "=SUBSTITUTE(\"banana\",\"a\",\"o\")"

  - id: substitute_nth_only
    description: "SUBSTITUTE(str,old,new,n) replaces only the n-th occurrence"
    formula: "=SUBSTITUTE(\"banana\",\"a\",\"o\",2)"

  - id: substitute_no_match_passthrough
    formula: "=SUBSTITUTE(\"banana\",\"x\",\"o\")"

  # -- REPT ----------------------------------------------------------------
  - id: rept_three_times
    formula: "=REPT(\"ab\",3)"

  - id: rept_zero_count
    formula: "=REPT(\"ab\",0)"

  - id: rept_negative_is_value
    formula: "=REPT(\"ab\",-1)"

  # -- TEXTJOIN ------------------------------------------------------------
  - id: textjoin_simple
    formula: "=TEXTJOIN(\",\",TRUE,\"a\",\"b\",\"c\")"

  - id: textjoin_ignore_empty_true
    description: "ignore_empty=TRUE skips empty strings in the separator"
    formula: "=TEXTJOIN(\",\",TRUE,\"a\",\"\",\"c\")"

  - id: textjoin_ignore_empty_false
    formula: "=TEXTJOIN(\",\",FALSE,\"a\",\"\",\"c\")"

  - id: textjoin_range
    setup: { A1: "a", A2: "b", A3: "c" }
    formula: "=TEXTJOIN(\",\",TRUE,A1:A3)"

  # -- UNICHAR / UNICODE ---------------------------------------------------
  - id: unichar_ascii_a
    formula: "=UNICHAR(65)"

  - id: unichar_japanese
    description: "0x3042 = あ"
    formula: "=UNICHAR(12354)"

  - id: unichar_zero_is_value
    description: "Excel: UNICHAR(0) -> #VALUE!"
    formula: "=UNICHAR(0)"

  - id: unicode_ascii
    formula: "=UNICODE(\"A\")"

  - id: unicode_japanese
    formula: "=UNICODE(\"あ\")"

  # -- LENB (ja-JP DBCS byte count) ---------------------------------------
  - id: lenb_ascii
    formula: "=LENB(\"hello\")"

  - id: lenb_empty
    formula: "=LENB(\"\")"

  - id: lenb_hiragana
    description: "Each hiragana is 2 bytes under ja-JP DBCS (LENB = 6)"
    formula: "=LENB(\"あいう\")"

  - id: lenb_mixed
    description: "3 ASCII (1b each) + 1 hiragana (2b) = 5"
    formula: "=LENB(\"abcあ\")"

  - id: lenb_halfwidth_kana
    description: "Half-width katakana U+FF61..U+FF9F are 1 byte each"
    formula: "=LENB(\"ｱｲｳ\")"

  - id: lenb_supplementary_plane
    description: "Supplementary-plane emoji: verify Excel's DBCS byte count"
    formula: "=LENB(\"😀\")"

  - id: lenb_kanji_pair
    description: "Two CJK ideographs: 2 chars * 2 bytes = 4"
    formula: "=LENB(\"漢字\")"

  - id: lenb_mixed_ascii_kanji
    description: "2 kanji (4b) + 3 ASCII (3b) = 7 (NB existing lenb_mixed uses 'abcあ')"
    formula: "=LENB(\"漢ABC字\")"

  - id: lenb_fullwidth_kana_dakuten_composed
    description: "Single composed full-width 'ガ' (U+30AC). Probe: NFC composed = 2 bytes"
    formula: "=LENB(\"ガ\")"

  - id: lenb_halfwidth_kana_with_dakuten
    description: "Half-width 'ｶ'(U+FF76)+combining dakuten 'ﾞ'(U+FF9E): 2 chars * 1 byte = 2"
    formula: "=LENB(\"ｶﾞ\")"

  - id: lenb_circled_digit
    description: "Circled digit '①' (U+2460) is BMP non-ASCII: probe DBCS 2 bytes"
    formula: "=LENB(\"①\")"

  - id: lenb_latin_extended
    description: "Latin extended 'â' (U+00E2) BMP non-ASCII: probe DBCS 2 bytes"
    formula: "=LENB(\"â\")"

  - id: lenb_fullwidth_space
    description: "Ideographic space U+3000: 2 bytes"
    formula: "=LENB(\"　\")"

  - id: lenb_halfwidth_space
    description: "ASCII space U+0020: 1 byte"
    formula: "=LENB(\" \")"

  - id: lenb_newline
    description: "LF newline U+000A: 1 byte"
    formula: "=LENB(CHAR(10))"

  - id: lenb_combining_dakuten
    description: "Base 'か' + combining dakuten U+3099: probe Mac NFC vs decomposed (2+2=4 expected unless recomposed)"
    formula: "=LENB(\"か\" & UNICHAR(12441))"

  - id: lenb_coerces_number
    description: "LENB coerces numbers to text first; '123' = 3 bytes"
    formula: "=LENB(123)"

  - id: lenb_coerces_bool
    description: "LENB(TRUE) -> 'TRUE' = 4 bytes"
    formula: "=LENB(TRUE)"

  # -- LEFTB --------------------------------------------------------------
  - id: leftb_ascii
    formula: "=LEFTB(\"hello\", 3)"

  - id: leftb_default_count
    formula: "=LEFTB(\"hello\")"

  - id: leftb_hiragana_exact
    description: "Budget 4 = 2 full hiragana chars"
    formula: "=LEFTB(\"あいう\", 4)"

  - id: leftb_hiragana_splits
    description: "Budget 3: 1 full hiragana + space pad on 1-byte overflow"
    formula: "=LEFTB(\"あいう\", 3)"

  - id: leftb_negative_is_value
    formula: "=LEFTB(\"hello\", -1)"

  - id: leftb_zero_count
    formula: "=LEFTB(\"hello\", 0)"

  - id: leftb_split_kanji_one_byte
    description: "Budget 1 splits the 2-byte kanji: probe pad-with-space behaviour"
    formula: "=LEFTB(\"漢字\", 1)"

  - id: leftb_kanji_exact_boundary
    description: "Budget 2 = exactly 1 kanji"
    formula: "=LEFTB(\"漢字\", 2)"

  - id: leftb_mixed_overshoots_into_kanji
    description: "'ABC漢' is 5 bytes (3+2); budget 4 splits the kanji -> 'ABC '"
    formula: "=LEFTB(\"ABC漢\", 4)"

  - id: leftb_over_budget
    description: "Asking for more bytes than the source provides returns the full string"
    formula: "=LEFTB(\"hello\", 100)"

  - id: leftb_split_composed_dakuten
    description: "Single composed 'が' (NFC, 2 bytes); budget 1 = pad-with-space"
    formula: "=LEFTB(\"が\", 1)"

  # -- RIGHTB -------------------------------------------------------------
  - id: rightb_ascii
    formula: "=RIGHTB(\"hello\", 3)"

  - id: rightb_hiragana_exact
    description: "Budget 4 = rightmost 2 hiragana chars"
    formula: "=RIGHTB(\"あいう\", 4)"

  - id: rightb_hiragana_splits
    description: "Budget 3: space pad then rightmost full hiragana"
    formula: "=RIGHTB(\"あいう\", 3)"

  - id: rightb_split_kanji_one_byte
    description: "Budget 1 splits the rightmost 2-byte kanji from the right edge"
    formula: "=RIGHTB(\"漢字\", 1)"

  - id: rightb_mixed_three_bytes
    description: "'ABC漢' is 5 bytes; rightmost 3 = 'C' + kanji (2b) -> 'C漢'"
    formula: "=RIGHTB(\"ABC漢\", 3)"

  - id: rightb_over_budget
    description: "Budget exceeds source size -> full string"
    formula: "=RIGHTB(\"hello\", 100)"

  # -- MIDB ---------------------------------------------------------------
  - id: midb_ascii
    formula: "=MIDB(\"hello\", 2, 3)"

  - id: midb_hiragana_clean
    description: "Byte window starts on a clean hiragana boundary"
    formula: "=MIDB(\"あいうえお\", 3, 4)"

  - id: midb_hiragana_start_mid_char
    description: "Start byte lands inside a 2-byte char: Excel pads with spaces"
    formula: "=MIDB(\"あいうえお\", 2, 4)"

  - id: midb_start_beyond
    formula: "=MIDB(\"abc\", 10, 3)"

  - id: midb_start_zero_is_value
    formula: "=MIDB(\"abc\", 0, 3)"

  - id: midb_start_negative_is_value
    formula: "=MIDB(\"hello\", -1, 3)"

  - id: midb_kanji_clean_start
    description: "Start byte 4 = the kanji in 'ABC漢XY'; 2-byte budget extracts the kanji"
    formula: "=MIDB(\"ABC漢XY\", 4, 2)"

  - id: midb_kanji_split_length
    description: "Start byte 4 (kanji boundary) but only 1-byte budget: probe head-pad-then-stop or trailing-pad"
    formula: "=MIDB(\"ABC漢XY\", 4, 1)"

  - id: midb_start_inside_kanji
    description: "Start byte 5 lands strictly inside the 2-byte 'ABC漢XY' kanji: head-pad space"
    formula: "=MIDB(\"ABC漢XY\", 5, 1)"

  - id: midb_over_length
    description: "Window much larger than source: full string"
    formula: "=MIDB(\"漢字\", 1, 100)"

  # -- CHAR ---------------------------------------------------------------
  - id: char_ascii_a
    formula: "=CHAR(65)"

  - id: char_space
    formula: "=CHAR(32)"

  - id: char_high_byte
    description: "0x80..0xFF range: Excel ja-JP uses CP932; oracle decides"
    formula: "=CHAR(169)"

  - id: char_zero_is_value
    formula: "=CHAR(0)"

  - id: char_256_is_value
    formula: "=CHAR(256)"

  # -- CODE ---------------------------------------------------------------
  - id: code_ascii_a
    formula: "=CODE(\"A\")"

  - id: code_empty_is_value
    formula: "=CODE(\"\")"

  - id: code_multi_char_uses_first
    formula: "=CODE(\"Apple\")"

  - id: code_hiragana_first
    description: "Non-ASCII: Excel ja-JP returns CP932; oracle decides"
    formula: "=CODE(\"あいう\")"

  # -- REPLACE ------------------------------------------------------------
  - id: replace_middle
    description: "Replace 3 UTF-16 units starting at position 2 with 'XYZ'"
    formula: "=REPLACE(\"abcdef\", 2, 3, \"XYZ\")"

  - id: replace_append
    description: "start_num past end appends new_text to old_text"
    formula: "=REPLACE(\"abc\", 5, 2, \"XYZ\")"

  - id: replace_empty_new
    formula: "=REPLACE(\"abcdef\", 2, 3, \"\")"

  # -- REPLACEB (ja-JP DBCS bytes) ----------------------------------------
  - id: replaceb_hiragana_middle
    description: "Replace 2 DBCS bytes starting at byte 3 (the second hiragana) with 'X'"
    formula: "=REPLACEB(\"あいう\", 3, 2, \"X\")"

  - id: replaceb_head_pad
    description: "start_byte=2 splits 'あ'; MIDB-style head-pad ASCII space"
    formula: "=REPLACEB(\"あい\", 2, 2, \"X\")"

  - id: replaceb_tail_pad
    description: "Deletion window ends inside a 2-byte char -> trailing ASCII space"
    formula: "=REPLACEB(\"あいう\", 1, 3, \"X\")"

  # -- FINDB / SEARCHB ----------------------------------------------------
  - id: findb_hiragana
    description: "Each hiragana = 2 DBCS bytes; 'う' starts at byte 5 in 'あいう'"
    formula: "=FINDB(\"う\", \"あいう\")"

  - id: findb_not_found_is_value
    formula: "=FINDB(\"z\", \"abcdef\")"

  - id: findb_empty_needle_returns_start
    description: "FIND quirk: empty needle returns start_num"
    formula: "=FINDB(\"\", \"abc\", 2)"

  - id: searchb_hiragana_wildcard
    description: "'い*' matches from 'い' (DBCS byte 3) in 'あいう'"
    formula: "=SEARCHB(\"い*\", \"あいう\")"

  - id: searchb_case_insensitive
    formula: "=SEARCHB(\"B\", \"abc\")"

  - id: findb_repeated_kanji_first
    description: "First '字' starts at DBCS byte 3 in '漢字漢字'"
    formula: "=FINDB(\"字\", \"漢字漢字\")"

  - id: findb_repeated_kanji_with_start
    description: "Search '字' from byte 4 onward: skips first '字' at byte 3, next '字' at byte 7"
    formula: "=FINDB(\"字\", \"漢字漢字\", 4)"

  - id: findb_ascii_in_kanji_not_found
    description: "Latin 'a' is absent from '漢字' -> #VALUE!"
    formula: "=FINDB(\"a\", \"漢字\", 1)"

  - id: findb_empty_needle_default_start
    description: "Empty needle with no start_num -> 1"
    formula: "=FINDB(\"\", \"abc\")"

  - id: searchb_question_wildcard_in_kanji
    description: "'?' wildcard matches any single character; should land on byte 1"
    formula: "=SEARCHB(\"?\", \"漢ABC\")"

  - id: searchb_star_wildcard_default
    description: "'*' matches the empty prefix at the very start -> byte position 1"
    formula: "=SEARCHB(\"*\", \"あいう\")"

  - id: searchb_kanji_exact_byte_position
    description: "'漢' starts at DBCS byte 4 in 'ABC漢'"
    formula: "=SEARCHB(\"漢\", \"ABC漢\", 1)"

  # -- FIXED --------------------------------------------------------------
  - id: fixed_positive
    formula: "=FIXED(1234567.891, 2)"

  - id: fixed_default_two_decimals
    formula: "=FIXED(1234.5678)"

  - id: fixed_negative_decimals
    description: "Negative decimals rounds left of decimal point"
    formula: "=FIXED(1234.56, -2)"

  - id: fixed_no_commas
    formula: "=FIXED(1234567.891, -3, TRUE)"

  # -- DOLLAR (Mac Excel ja-JP uses yen sign '¥' = UTF-8 0xC2 0xA5) -------
  - id: dollar_positive
    description: "Mac Excel ja-JP DOLLAR uses ¥ prefix and defaults to 0 decimals (en-US defaults to 2). 1234.5 rounds to 1235."
    formula: "=DOLLAR(1234.5)"

  - id: dollar_negative_minus_sign
    description: "ja-JP renders negatives as '¥-1,235' (literal minus inside prefix), not '($...)' parens like en-US. Default decimals = 0."
    formula: "=DOLLAR(-1234.5)"

  - id: dollar_zero
    description: "ja-JP default decimals = 0, so DOLLAR(0) is '¥0' (no fractional part)."
    formula: "=DOLLAR(0)"

  - id: dollar_negative_decimals
    description: "DOLLAR(1234.5, -2) rounds to 1200 first"
    formula: "=DOLLAR(1234.5, -2)"

  # -- TEXTBEFORE / TEXTAFTER ---------------------------------------------
  - id: textbefore_first
    formula: "=TEXTBEFORE(\"abc-def-ghi\", \"-\")"

  - id: textbefore_second
    formula: "=TEXTBEFORE(\"abc-def-ghi\", \"-\", 2)"

  - id: textbefore_negative_instance
    description: "instance_num = -1 selects the last occurrence"
    formula: "=TEXTBEFORE(\"abc-def-ghi\", \"-\", -1)"

  - id: textbefore_not_found_is_na
    formula: "=TEXTBEFORE(\"abc\", \"-\")"

  - id: textbefore_if_not_found_custom
    formula: "=TEXTBEFORE(\"abc\", \"-\", 1, 0, 0, \"NA\")"

  - id: textafter_first
    formula: "=TEXTAFTER(\"abc-def-ghi\", \"-\")"

  - id: textafter_negative_instance
    formula: "=TEXTAFTER(\"abc-def-ghi\", \"-\", -1)"

  - id: textafter_match_end_at_end
    description: "match_end=1 + instance=-1 matches the end-of-text sentinel"
    formula: "=TEXTAFTER(\"abc\", \"-\", -1, 0, 1)"

  # -- HYPERLINK -----------------------------------------------------------
  - id: hyperlink_link_only
    description: "Single-arg HYPERLINK returns link_location as text"
    formula: "=HYPERLINK(\"http://example.com\")"

  - id: hyperlink_with_friendly
    description: "Two-arg HYPERLINK returns friendly_name"
    formula: "=HYPERLINK(\"http://example.com\", \"Click here\")"

  - id: hyperlink_numeric_friendly
    description: "friendly_name numeric coerces to shortest text"
    formula: "=HYPERLINK(\"x\", 42)"

  - id: hyperlink_numeric_link
    description: "link_location numeric coerces when friendly_name is absent"
    formula: "=HYPERLINK(123)"
