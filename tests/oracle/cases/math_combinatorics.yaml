suite: math_combinatorics
description: >
  Combinatorial, numeral-system, precise-rounding, and miscellaneous scalar
  math builtins (ARABIC, ROMAN, BASE, DECIMAL, CEILING.PRECISE, FLOOR.PRECISE,
  ISO.CEILING, COMBIN, COMBINA, FACT, FACTDOUBLE, GCD, LCM, MULTINOMIAL,
  SQRTPI). Kept in a separate suite so the existing math golden stays
  bit-stable and only new cases need to be populated by `make oracle-gen`
  on macOS.
tolerance: { abs: 1.0e-12, rel: 1.0e-12 }
locale: ja-JP
cases:
  # -- FACT ----------------------------------------------------------------
  - id: fact_zero
    formula: "=FACT(0)"

  - id: fact_five
    formula: "=FACT(5)"

  - id: fact_fractional_truncates
    description: "Fractional input truncates toward zero: FACT(5.9) = 120."
    formula: "=FACT(5.9)"

  - id: fact_negative_is_num
    formula: "=FACT(-1)"

  - id: fact_overflow_is_num
    description: "171! overflows double precision."
    formula: "=FACT(171)"

  # -- FACTDOUBLE ----------------------------------------------------------
  - id: factdouble_zero
    formula: "=FACTDOUBLE(0)"

  - id: factdouble_minus_one
    description: "Excel quirk: FACTDOUBLE(-1) = 1."
    formula: "=FACTDOUBLE(-1)"

  - id: factdouble_seven
    description: "7!! = 7 * 5 * 3 * 1 = 105."
    formula: "=FACTDOUBLE(7)"

  - id: factdouble_eight
    description: "8!! = 8 * 6 * 4 * 2 = 384."
    formula: "=FACTDOUBLE(8)"

  # -- COMBIN --------------------------------------------------------------
  - id: combin_five_choose_two
    formula: "=COMBIN(5, 2)"

  - id: combin_n_choose_n
    formula: "=COMBIN(7, 7)"

  - id: combin_k_greater_is_num
    formula: "=COMBIN(3, 5)"

  - id: combin_fractional_truncates
    formula: "=COMBIN(5.9, 2.5)"

  # -- COMBINA -------------------------------------------------------------
  - id: combina_four_three
    description: "Multichoose(4, 3) = C(6, 3) = 20."
    formula: "=COMBINA(4, 3)"

  - id: combina_k_greater_allowed
    description: "Multichoose(3, 5) = C(7, 5) = 21."
    formula: "=COMBINA(3, 5)"

  - id: combina_zero_zero
    formula: "=COMBINA(0, 0)"

  - id: combina_negative_is_num
    formula: "=COMBINA(-1, 2)"

  # -- MULTINOMIAL ---------------------------------------------------------
  - id: multinomial_single_arg
    formula: "=MULTINOMIAL(5)"

  - id: multinomial_two_args
    description: "MULTINOMIAL(2, 3) = 5!/(2!*3!) = 10."
    formula: "=MULTINOMIAL(2, 3)"

  - id: multinomial_three_args
    description: "MULTINOMIAL(1, 2, 3) = 6!/(1!*2!*3!) = 60."
    formula: "=MULTINOMIAL(1, 2, 3)"

  - id: multinomial_negative_is_num
    formula: "=MULTINOMIAL(2, -1, 3)"

  # -- GCD -----------------------------------------------------------------
  - id: gcd_two_args
    formula: "=GCD(12, 18)"

  - id: gcd_three_args
    formula: "=GCD(24, 36, 60)"

  - id: gcd_all_zero
    formula: "=GCD(0, 0)"

  - id: gcd_negative_is_num
    formula: "=GCD(12, -18)"

  # -- LCM -----------------------------------------------------------------
  - id: lcm_two_args
    formula: "=LCM(4, 6)"

  - id: lcm_three_args
    formula: "=LCM(2, 3, 4)"

  - id: lcm_any_zero_is_zero
    description: "Excel quirk: a zero argument forces the whole LCM to 0."
    formula: "=LCM(4, 0, 6)"

  - id: lcm_negative_is_num
    formula: "=LCM(4, -6)"

  # -- ARABIC --------------------------------------------------------------
  - id: arabic_subtractive
    formula: "=ARABIC(\"MCMXCIX\")"

  - id: arabic_empty_is_zero
    formula: "=ARABIC(\"\")"

  - id: arabic_negative_prefix
    description: "Leading '-' produces a negative result: -MCM = -1900."
    formula: "=ARABIC(\"-MCM\")"

  - id: arabic_invalid_char
    formula: "=ARABIC(\"FOO\")"

  - id: arabic_lowercase
    formula: "=ARABIC(\"xiv\")"

  # -- ROMAN ---------------------------------------------------------------
  - id: roman_classic
    formula: "=ROMAN(1999)"

  - id: roman_zero_is_empty
    formula: "=ROMAN(0)"

  - id: roman_four
    formula: "=ROMAN(4)"

  - id: roman_forty_nine
    formula: "=ROMAN(49)"

  - id: roman_out_of_range_negative
    formula: "=ROMAN(-1)"

  - id: roman_out_of_range_above
    formula: "=ROMAN(4000)"

  - id: roman_499_form_0
    description: "Documented Excel example: ROMAN(499, 0) = CDXCIX."
    formula: "=ROMAN(499, 0)"

  - id: roman_499_form_1
    description: "Documented Excel example: ROMAN(499, 1) = LDVLIV."
    formula: "=ROMAN(499, 1)"

  - id: roman_499_form_2
    description: "Documented Excel example: ROMAN(499, 2) = XDIX."
    formula: "=ROMAN(499, 2)"

  - id: roman_499_form_3
    description: "Documented Excel example: ROMAN(499, 3) = VDIV."
    formula: "=ROMAN(499, 3)"

  - id: roman_499_form_4
    description: "Documented Excel example: ROMAN(499, 4) = ID."
    formula: "=ROMAN(499, 4)"

  - id: roman_1999_form_4
    description: "Documented Excel example: ROMAN(1999, 4) = MIM."
    formula: "=ROMAN(1999, 4)"

  # -- BASE ----------------------------------------------------------------
  - id: base_binary_of_seven
    formula: "=BASE(7, 2)"

  - id: base_hex_of_fifteen
    formula: "=BASE(15, 16)"

  - id: base_36_of_thirty_five
    formula: "=BASE(35, 36)"

  - id: base_min_len_pads
    formula: "=BASE(7, 2, 8)"

  - id: base_zero
    formula: "=BASE(0, 2)"

  - id: base_negative_is_num
    formula: "=BASE(-1, 2)"

  - id: base_bad_radix_is_num
    formula: "=BASE(5, 1)"

  # -- DECIMAL -------------------------------------------------------------
  - id: decimal_binary_of_seven
    formula: "=DECIMAL(\"111\", 2)"

  - id: decimal_hex_of_ff
    formula: "=DECIMAL(\"FF\", 16)"

  - id: decimal_lowercase_hex
    formula: "=DECIMAL(\"ff\", 16)"

  - id: decimal_empty_is_value
    formula: "=DECIMAL(\"\", 10)"

  - id: decimal_bad_digit_is_num
    formula: "=DECIMAL(\"2\", 2)"

  - id: decimal_bad_radix_is_num
    formula: "=DECIMAL(\"10\", 1)"

  # -- CEILING.PRECISE -----------------------------------------------------
  - id: ceiling_precise_positive_default
    formula: "=CEILING.PRECISE(4.3)"

  - id: ceiling_precise_negative_toward_plus_inf
    description: "Always rounds toward +inf; -4.3 -> -4."
    formula: "=CEILING.PRECISE(-4.3)"

  - id: ceiling_precise_negative_sig_ignored
    description: "Negative sig is treated as |sig|."
    formula: "=CEILING.PRECISE(-4.3, -2)"

  - id: ceiling_precise_sig_zero
    formula: "=CEILING.PRECISE(4.3, 0)"

  # -- FLOOR.PRECISE -------------------------------------------------------
  - id: floor_precise_positive_default
    formula: "=FLOOR.PRECISE(4.7)"

  - id: floor_precise_negative_toward_minus_inf
    formula: "=FLOOR.PRECISE(-4.3)"

  - id: floor_precise_negative_sig_ignored
    formula: "=FLOOR.PRECISE(4.7, -2)"

  - id: floor_precise_sig_zero
    formula: "=FLOOR.PRECISE(4.7, 0)"

  # -- ISO.CEILING ---------------------------------------------------------
  - id: iso_ceiling_positive
    formula: "=ISO.CEILING(4.3, 2)"

  - id: iso_ceiling_negative
    description: "Alias of CEILING.PRECISE; rounds toward +inf."
    formula: "=ISO.CEILING(-4.3)"

  - id: iso_ceiling_default_sig
    formula: "=ISO.CEILING(4.3)"

  - id: iso_ceiling_sig_zero
    formula: "=ISO.CEILING(4.3, 0)"

  # -- SQRTPI --------------------------------------------------------------
  - id: sqrtpi_one
    description: "sqrt(1 * pi) ~= 1.7724538509055159."
    formula: "=SQRTPI(1)"

  - id: sqrtpi_zero
    formula: "=SQRTPI(0)"

  - id: sqrtpi_four
    description: "sqrt(4 * pi) = 2 * sqrt(pi)."
    formula: "=SQRTPI(4)"

  - id: sqrtpi_negative_is_num
    formula: "=SQRTPI(-1)"
