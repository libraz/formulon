suite: countif_edges
description: >
  COUNTIF / SUMIF criteria-engine edge cases observed in IronCalc's
  COUNTIF_Rows / COUNTIF_Columns / COUNTIFS_Rows2 suites. Each case here
  probes a specific semantic question that the existing `countif.yaml`
  coverage does not answer, so we can confirm whether Mac Excel 365 (ja-JP)
  agrees with Formulon, with IronCalc, or with neither. The author-side
  `expect:` value below each case is Formulon's current return, included as
  a documentation aid; the verifier compares against the Excel-observed
  golden JSON (not this field) once oracle-gen has been run.
tolerance: { abs: 0, rel: 0 }
locale: ja-JP
cases:
  # ---------------------------------------------------------------------
  # A) Error criterion over a range with matching literal-error cells.
  # IronCalc's Y-column scenario: range has two #N/A cells plus a
  # #DIV/0!, criterion is a literal #N/A. Three possibilities:
  #   * Excel propagates the error: result is #N/A.
  #   * Excel counts matching-code cells: result is 2.
  #   * Excel counts only non-formula error cells: result is 1.
  - id: countif_error_criterion_na_over_two_na
    description: "COUNTIF with #N/A criterion over range with 2 x #N/A + 1 x #DIV/0!"
    setup:
      A1: { kind: error, code: "#N/A" }
      A2: 12
      A3: { kind: error, code: "#DIV/0!" }
      A4: { kind: error, code: "#N/A" }
      B1: { kind: error, code: "#N/A" }
    formula: "=COUNTIF(A1:A4,B1)"

  - id: countif_error_criterion_div0_over_div0
    description: "COUNTIF with #DIV/0! criterion over range with 2 x #DIV/0!"
    setup:
      A1: { kind: error, code: "#DIV/0!" }
      A2: 12
      A3: { kind: error, code: "#DIV/0!" }
      A4: 7
      B1: { kind: error, code: "#DIV/0!" }
    formula: "=COUNTIF(A1:A4,B1)"

  # B) Error criterion where some range cells are formula-produced errors.
  # Mirrors IronCalc's T12/T13 setup (=1/0 alongside a literal #DIV/0!).
  # If Mac behaves consistently, formula-produced #DIV/0! should match
  # the same criterion as a literal one.
  - id: countif_error_criterion_div0_mixed_source
    description: "Range has 1 literal + 2 formula-produced #DIV/0!"
    setup:
      A1: "=1/0"
      A2: { kind: error, code: "#DIV/0!" }
      A3: "=1/0"
      A4: 5
      B1: { kind: error, code: "#DIV/0!" }
    formula: "=COUNTIF(A1:A4,B1)"

  # C) Text lexicographic less-than criterion. IronCalc D20 / V4.
  # Range contains names starting with letters around 'b'. The question
  # is whether Excel case-insensitively compares "Mr. Brown" vs "brown"
  # (first char m>b) and how blanks / errors participate.
  - id: countif_lex_lt_brown_names
    description: "<brown over Albert/Bernanrd/Mr. Brown/Mrs. Brown/Steven"
    setup:
      A1: "Steven"
      A2: "Albert"
      A3: "Bernanrd"
      A4: "Mr. Brown"
      A5: "Mrs. Brown"
      A6: "Albert"
    formula: "=COUNTIF(A1:A6,\"<brown\")"

  - id: countif_lex_lt_brown_with_errors_blank
    description: "<brown over names + error cells + blanks"
    setup:
      A1: "Albert"
      A2: "Bernanrd"
      A3: "Steven"
      A4: { kind: error, code: "#N/A" }
      A5: { kind: error, code: "#DIV/0!" }
    formula: "=COUNTIF(A1:A6,\"<brown\")"

  - id: countif_lex_gte_brown
    description: ">=brown over the name set"
    setup:
      A1: "Steven"
      A2: "Albert"
      A3: "Bernanrd"
      A4: "Mr. Brown"
      A5: "Mrs. Brown"
    formula: "=COUNTIF(A1:A5,\">=brown\")"

  # D) Bool criterion vs text / number cells.
  # IronCalc AG column: range mixes bool TRUE/FALSE, number 1/0, and
  # text "TRUE". Criterion text "TRUE" expected to match bool cells in
  # Excel (display-form coercion) or only the text cell (type-strict).
  - id: countif_text_true_over_mixed
    description: "Text criterion \"TRUE\" over bool/number/text range"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
    formula: "=COUNTIF(A1:A8,\"TRUE\")"

  - id: countif_text_true_lowercase
    description: "Lowercase \"true\" text criterion over same range"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
    formula: "=COUNTIF(A1:A8,\"true\")"

  - id: countif_bool_true_over_mixed
    description: "Bool criterion TRUE (unquoted) over same range"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
    formula: "=COUNTIF(A1:A8,TRUE)"

  - id: countif_notequal_true_over_mixed
    description: "NotEq text criterion \"<>TRUE\" over same range"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
    formula: "=COUNTIF(A1:A8,\"<>TRUE\")"

  # E) Ordering ops against error / blank cells.
  - id: countif_lt_number_over_mixed
    description: "<5 over mixed number/text/error range"
    setup:
      A1: 3
      A2: 10
      A3: "apple"
      A4: { kind: error, code: "#N/A" }
      A5: 0
    formula: "=COUNTIF(A1:A5,\"<5\")"

  - id: countif_ne_text_over_errors
    description: "<>text criterion over range containing errors"
    setup:
      A1: "apple"
      A2: "banana"
      A3: { kind: error, code: "#N/A" }
      A4: "apple"
    formula: "=COUNTIF(A1:A4,\"<>apple\")"

  # F) CONCAT building a criterion from an error value. The question is
  # whether CONCAT propagates the error (so the criterion argument is
  # itself #N/A) or coerces the error to the display string "#N/A" (so
  # the criterion becomes the text "<>#N/A").
  - id: countif_concat_ne_error_text_range
    description: "COUNTIF with CONCAT(<>, err) over text range"
    setup:
      A1: "apple"
      A2: "banana"
      A3: { kind: error, code: "#N/A" }
      A4: "cherry"
      B1: { kind: error, code: "#N/A" }
    formula: "=COUNTIF(A1:A4,CONCAT(\"<>\",B1))"

  - id: countif_concat_ne_error_mixed_range
    description: "COUNTIF with CONCAT(<>, #N/A) over range incl errors"
    setup:
      A1: { kind: error, code: "#N/A" }
      A2: 12
      A3: { kind: error, code: "#DIV/0!" }
      A4: { kind: error, code: "#N/A" }
      A5: 0
      B1: { kind: error, code: "#N/A" }
    formula: "=COUNTIF(A1:A5,CONCAT(\"<>\",B1))"

  - id: concat_of_ne_and_error_alone
    description: "What does CONCAT(<>, #N/A) return standalone?"
    setup:
      A1: { kind: error, code: "#N/A" }
    formula: "=CONCAT(\"<>\",A1)"

  # G) Blank vs empty string vs literal "" formula result.
  # IronCalc G25/H25 are =""; we include one here so we can compare
  # COUNTIF("=", formula-empty-string) directly.
  - id: countif_empty_vs_formula_empty
    description: "COUNTIF(=\"\") over blank + formula-empty + text ranges"
    setup:
      A1: "=\"\""
      A2: ""
      A3: null
      A4: "apple"
    formula: "=COUNTIF(A1:A4,\"\")"

  - id: countif_notequal_empty_over_mixed
    description: "COUNTIF(<>) over same range (non-blank filter)"
    setup:
      A1: "=\"\""
      A2: ""
      A3: null
      A4: "apple"
    formula: "=COUNTIF(A1:A4,\"<>\")"

  # H) Numeric criterion from a cell holding a bool — Excel treats bool
  # cell criterion differently than a number criterion.
  - id: countif_cell_criterion_bool_true
    description: "Cell criterion holds bool TRUE; range has bool + 1"
    setup:
      A1: true
      A2: 1
      A3: false
      A4: true
      B1: true
    formula: "=COUNTIF(A1:A4,B1)"

  - id: countif_cell_criterion_number_one
    description: "Cell criterion holds number 1; range has bool + 1"
    setup:
      A1: true
      A2: 1
      A3: false
      A4: true
      B1: 1
    formula: "=COUNTIF(A1:A4,B1)"

  # Additional: bool criterion via CELL reference, range includes text
  # "TRUE". Distinguishes literal-TRUE vs cell-TRUE semantics observed
  # in IronCalc's AI3 case: IronCalc expects 3 here (type-strict), but
  # Mac behavior is the source of truth.
  - id: countif_cell_criterion_bool_true_with_text
    description: "Cell criterion bool TRUE; range has bool + number + text TRUE"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
      B1: true
    formula: "=COUNTIF(A1:A8,B1)"

  # ---------------------------------------------------------------------
  # I) Wildcard criterion vs Number cells. Mirrors IronCalc's
  # SUMIF_AVERAGE_IF J6/K6 scenario: criterion "12*" over a range that
  # mixes Text cells (clearly non-numeric, e.g. "12 Oak Street") and
  # Number cells (1213 as number). The question is whether Excel applies
  # wildcard matching to Number cells (coercing to their display text)
  # or only to genuine Text cells. We avoid the digit-only text literal
  # ("1213") because xlwings would coerce that to a Number on write.
  - id: countif_wildcard_matches_text_cells_only
    description: "Wildcard 12* over mixed text/number range"
    setup:
      A1: "12 Oak Street"
      A2: "Alemania"
      A3: "Argentina"
      A4: "Paraguay"
      A5: "XYZ"
      A6: "QWERTY"
      A7: 1213
      A8: "tron"
    formula: "=COUNTIF(A1:A8,\"12*\")"

  # Companion: SUMIF using the same pattern, with an error-producing
  # formula in the sum_range at the position aligned with the Number cell
  # A7. If Formulon counts A7 as a match (wrong), the SUMIF visits B7 and
  # may propagate the error it holds. If wildcard-text-only is honoured,
  # B7 is never visited and SUMIF returns B1 = 3.
  - id: sumif_wildcard_text_only_skips_number_match
    description: "SUMIF wildcard 12* ignores Number cells so error in sum_range is skipped"
    setup:
      A1: "12 Oak Street"
      A2: "Alemania"
      A3: "Argentina"
      A4: "Paraguay"
      A5: "XYZ"
      A6: "QWERTY"
      A7: 1213
      A8: "tron"
      B1: 3
      B2: 4
      B3: 5
      B4: 6
      B5: -3
      B6: 12
      B7: "=1/0"
      B8: "=NA()"
    formula: "=SUMIF(A1:A8,\"12*\",B1:B8)"

  - id: averageif_wildcard_text_only_skips_number_match
    description: "AVERAGEIF wildcard 12* over mixed range returns average of text matches only"
    setup:
      A1: "12 Oak Street"
      A2: "Alemania"
      A3: "Argentina"
      A4: "Paraguay"
      A5: "XYZ"
      A6: "QWERTY"
      A7: 1213
      A8: "tron"
      B1: 3
      B2: 4
      B3: 5
      B4: 6
      B5: -3
      B6: 12
      B7: "=1/0"
      B8: "=NA()"
    formula: "=AVERAGEIF(A1:A8,\"12*\",B1:B8)"

  # ---------------------------------------------------------------------
  # J) Text-lex ordering criterion (">c") with matching sum_range errors.
  # Mirrors IronCalc's SUMIFS D13 / H13 / I13: criterion ">c" matches
  # many rows by lex compare, and one of those rows has an error in the
  # sum_range. The question is whether SUMIFS / MINIFS / MAXIFS propagate
  # the error from a lex-matched row the same way they do for a
  # literal-text-match row (which Formulon already does).
  - id: sumifs_gt_text_propagates_sum_range_error
    description: "SUMIFS with >c criterion and error in matching sum_range row"
    setup:
      A1: 10
      A2: "=1/0"
      A3: 20
      B1: "red"
      B2: "white"
      B3: "blue"
    formula: "=SUMIFS(A1:A3,B1:B3,\">c\")"

  - id: minifs_gt_text_propagates_sum_range_error
    description: "MINIFS with >c criterion and error in matching sum_range row"
    setup:
      A1: 10
      A2: "=1/0"
      A3: 20
      B1: "red"
      B2: "white"
      B3: "blue"
    formula: "=MINIFS(A1:A3,B1:B3,\">c\")"

  - id: maxifs_gt_text_propagates_sum_range_error
    description: "MAXIFS with >c criterion and error in matching sum_range row"
    setup:
      A1: 10
      A2: "=1/0"
      A3: 20
      B1: "red"
      B2: "white"
      B3: "blue"
    formula: "=MAXIFS(A1:A3,B1:B3,\">c\")"

  # Full reproduction of IronCalc SUMIFS Sheet1 D13 with all 19 rows so we
  # can see whether a mid-range #N/A or "" formula perturbs the iteration
  # before the #DIV/0! at row 10 can propagate.
  - id: sumifs_gt_text_full_ironcalc_setup
    description: "SUMIFS >c over full 19-row IronCalc range with mixed formula cells"
    setup:
      A1: 13
      A2: 17
      A3: -23
      A4: 5
      A5: 7
      A6: -3
      # A7 left blank (matches IronCalc A8).
      A8: "=NA()"
      A9: "=1/0"
      A10: "=\"\""
      A11: 113
      A12: "123"
      A13: true
      A14: 14
      A15: 77
      A16: 34
      # A17 left blank (matches IronCalc A18).
      A18: 0
      A19: "string"
      B1: "red"
      B2: "BLUE"
      B3: "yellow"
      B4: "dark blue"
      B5: "light blue"
      B6: "light yellow"
      B7: "dark yellow"
      B8: "brown"
      B9: "white"
      B10: "Mr. White"
      B11: "brown"
      B12: "blue"
      B13: "blue"
      B14: "white dark"
      B15: "red-ish"
      B16: "blue-ish"
      B17: "magenta"
      B18: "magenta"
      B19: "yellow"
    formula: "=SUMIFS(A1:A19,B1:B19,\">c\")"

  # ---------------------------------------------------------------------
  # K) Cell-ref text "TRUE" criterion vs literal "TRUE". Mirrors
  # IronCalc's COUNTIF_Rows AI6 / AI10: criterion is a Text cell (not a
  # literal). Distinguishes whether Excel's display-form coercion between
  # Bool cells and the Text "TRUE"/"FALSE" needle depends on whether the
  # criterion arrived as a literal or a cell value.
  - id: countif_cellref_text_true_uppercase
    description: "Cell criterion Text \"TRUE\" over mixed bool/number/text range"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
      B1: "TRUE"
    formula: "=COUNTIF(A1:A8,B1)"

  - id: countif_cellref_text_true_lowercase
    description: "Cell criterion Text \"true\" (lowercase) over same range"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
      B1: "true"
    formula: "=COUNTIF(A1:A8,B1)"

  # ---------------------------------------------------------------------
  # L) CONCAT("<>", bool TRUE) criterion over bool+number+text range
  # that also includes blank cells. Mirrors IronCalc's COUNTIF_Rows AJ3
  # pattern: CONCAT coerces the bool to text "TRUE", producing the
  # criterion "<>TRUE". The question is whether Excel COUNTIF:
  #   * Counts blank cells as "<>TRUE" (they are not equal to TRUE).
  #   * Excludes text "TRUE" cells (display-form equality to the needle).
  # Range has 8 populated cells (3 bool TRUE, 1 text "TRUE", 2 bool
  # FALSE, 2 numbers) + 2 blank rows spanning the rectangle.
  - id: countif_concat_ne_bool_true_over_range_with_blanks
    description: "CONCAT(<>, TRUE) over range with blanks + bool TRUE + text TRUE"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
      # A9 and A10 are left blank (no entry).
      B1: true
    formula: "=COUNTIF(A1:A10,_xlfn.CONCAT(\"<>\",B1))"

  - id: countif_concat_ne_text_true_over_range_with_blanks
    description: "CONCAT(<>, \"TRUE\") over range with blanks + bool TRUE + text TRUE"
    setup:
      A1: true
      A2: 1
      A3: 0
      A4: false
      A5: "TRUE"
      A6: true
      A7: true
      A8: false
    formula: "=COUNTIF(A1:A10,_xlfn.CONCAT(\"<>\",\"TRUE\"))"
