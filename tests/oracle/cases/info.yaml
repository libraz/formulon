suite: info
description: IS* predicates, T, N type-introspection and coercion
tolerance: { abs: 0.0, rel: 0.0 }
locale: ja-JP
cases:
  # -- ISBLANK -------------------------------------------------------------
  - id: isblank_of_empty_cell
    setup: {}
    formula: "=ISBLANK(A1)"

  - id: isblank_of_number
    setup: { A1: 1 }
    formula: "=ISBLANK(A1)"

  - id: isblank_of_empty_string
    description: "Excel: ISBLANK(\"\") is FALSE — empty string is not blank"
    setup: { A1: "" }
    formula: "=ISBLANK(A1)"

  # -- ISNUMBER ------------------------------------------------------------
  - id: isnumber_of_integer
    formula: "=ISNUMBER(42)"

  - id: isnumber_of_float
    formula: "=ISNUMBER(3.14)"

  - id: isnumber_of_text
    formula: "=ISNUMBER(\"42\")"

  - id: isnumber_of_bool
    description: "Excel: ISNUMBER(TRUE) is FALSE — bool is not a number"
    formula: "=ISNUMBER(TRUE)"

  - id: isnumber_of_error
    formula: "=ISNUMBER(1/0)"

  # -- ISTEXT --------------------------------------------------------------
  - id: istext_of_string_literal
    formula: "=ISTEXT(\"hello\")"

  - id: istext_of_empty_string
    formula: "=ISTEXT(\"\")"

  - id: istext_of_number
    formula: "=ISTEXT(42)"

  - id: istext_of_blank_cell
    description: "Excel: ISTEXT of a blank cell is FALSE"
    setup: {}
    formula: "=ISTEXT(A1)"

  # -- ISLOGICAL -----------------------------------------------------------
  - id: islogical_of_true
    formula: "=ISLOGICAL(TRUE)"

  - id: islogical_of_false
    formula: "=ISLOGICAL(FALSE)"

  - id: islogical_of_number
    formula: "=ISLOGICAL(1)"

  - id: islogical_of_text
    formula: "=ISLOGICAL(\"TRUE\")"

  # -- ISERROR / ISERR / ISNA ---------------------------------------------
  - id: iserror_of_div0
    formula: "=ISERROR(1/0)"

  - id: iserror_of_na
    formula: "=ISERROR(NA())"

  - id: iserror_of_number
    formula: "=ISERROR(42)"

  - id: iserr_of_div0
    description: "ISERR catches any error EXCEPT #N/A"
    formula: "=ISERR(1/0)"

  - id: iserr_of_na_is_false
    description: "ISERR ignores #N/A (use ISNA for that)"
    formula: "=ISERR(NA())"

  - id: isna_of_na
    formula: "=ISNA(NA())"

  - id: isna_of_div0
    description: "ISNA only matches #N/A"
    formula: "=ISNA(1/0)"

  - id: isna_of_number
    formula: "=ISNA(42)"

  # -- T (text coercion) ---------------------------------------------------
  - id: t_of_text
    formula: "=T(\"hello\")"

  - id: t_of_number
    description: "T returns empty string for non-text"
    formula: "=T(42)"

  - id: t_of_bool
    formula: "=T(TRUE)"

  - id: t_of_blank_cell
    setup: {}
    formula: "=T(A1)"

  # -- N (number coercion) -------------------------------------------------
  - id: n_of_number
    formula: "=N(42)"

  - id: n_of_true
    description: "N(TRUE) -> 1"
    formula: "=N(TRUE)"

  - id: n_of_false
    formula: "=N(FALSE)"

  - id: n_of_text
    description: "N of non-numeric text -> 0"
    formula: "=N(\"hello\")"

  - id: n_of_blank_cell
    setup: {}
    formula: "=N(A1)"

  # -- ISEVEN / ISODD (truncate-then-test parity) -------------------------
  - id: iseven_of_positive_even
    formula: "=ISEVEN(4)"

  - id: iseven_of_positive_odd
    formula: "=ISEVEN(3)"

  - id: iseven_of_zero
    formula: "=ISEVEN(0)"

  - id: iseven_negative_fraction_truncates
    description: "-2.9 truncates to -2 (NOT rounds to -3); -2 is even -> TRUE"
    formula: "=ISEVEN(-2.9)"

  - id: iseven_of_true
    description: "TRUE coerces to 1 -> odd -> FALSE"
    formula: "=ISEVEN(TRUE)"

  - id: iseven_of_false
    description: "FALSE coerces to 0 -> even -> TRUE"
    formula: "=ISEVEN(FALSE)"

  - id: iseven_of_text_is_value
    formula: "=ISEVEN(\"abc\")"

  - id: isodd_of_positive_odd
    formula: "=ISODD(3)"

  - id: isodd_of_positive_even
    formula: "=ISODD(4)"

  - id: isodd_negative_fraction_truncates
    description: "-3.9 truncates to -3 -> odd -> TRUE"
    formula: "=ISODD(-3.9)"

  - id: isodd_of_true
    formula: "=ISODD(TRUE)"

  # -- ISNONTEXT (inverse of ISTEXT; error does NOT propagate) -----------
  - id: isnontext_of_text_is_false
    formula: "=ISNONTEXT(\"hello\")"

  - id: isnontext_of_empty_string_is_false
    formula: "=ISNONTEXT(\"\")"

  - id: isnontext_of_number_is_true
    formula: "=ISNONTEXT(42)"

  - id: isnontext_of_bool_is_true
    formula: "=ISNONTEXT(TRUE)"

  - id: isnontext_of_error_is_true
    description: "Error argument is inspected, not propagated"
    formula: "=ISNONTEXT(1/0)"

  - id: isnontext_of_blank_cell_is_true
    setup: {}
    formula: "=ISNONTEXT(A1)"

  # -- ERROR.TYPE (error-code -> integer map) ----------------------------
  - id: error_type_div0_is_2
    formula: "=ERROR.TYPE(1/0)"

  - id: error_type_value_is_3
    formula: "=ERROR.TYPE(#VALUE!)"

  - id: error_type_ref_is_4
    formula: "=ERROR.TYPE(#REF!)"

  - id: error_type_name_is_5
    formula: "=ERROR.TYPE(#NAME?)"

  - id: error_type_num_is_6
    formula: "=ERROR.TYPE(#NUM!)"

  - id: error_type_na_is_7
    formula: "=ERROR.TYPE(NA())"

  - id: error_type_non_error_is_na
    description: "Non-error argument -> #N/A per Microsoft docs"
    formula: "=ERROR.TYPE(42)"

  # -- TYPE (kind -> integer map) ----------------------------------------
  - id: type_of_number
    formula: "=TYPE(42)"

  - id: type_of_text
    formula: "=TYPE(\"hello\")"

  - id: type_of_bool
    formula: "=TYPE(TRUE)"

  - id: type_of_error
    description: "propagate_errors=false wiring: TYPE(#DIV/0!) = 16"
    formula: "=TYPE(1/0)"

  - id: type_of_empty_cell
    description: "Excel: empty cell is Number-typed for TYPE purposes (1)"
    setup: {}
    formula: "=TYPE(A1)"

  # -- ISFORMULA (context-aware: peeks at cell.formula_text) --------------
  - id: isformula_of_formula_cell
    description: "A1 holds a formula -> TRUE"
    setup: { A1: "=1+2" }
    formula: "=ISFORMULA(A1)"

  - id: isformula_of_literal_cell
    setup: { A1: 42 }
    formula: "=ISFORMULA(A1)"

  - id: isformula_of_empty_cell
    setup: {}
    formula: "=ISFORMULA(A1)"

  - id: isformula_of_literal_number_is_value
    description: "Non-reference argument -> #VALUE!"
    formula: "=ISFORMULA(42)"

  - id: isformula_of_literal_text_is_value
    formula: "=ISFORMULA(\"A1\")"

  # -- ISREF (AST shape introspection) ------------------------------------
  - id: isref_of_cell_ref
    setup: { A1: 1 }
    formula: "=ISREF(A1)"

  - id: isref_of_range
    setup: { A1: 1, A2: 2 }
    formula: "=ISREF(A1:A2)"

  - id: isref_of_number_literal
    formula: "=ISREF(42)"

  - id: isref_of_text_literal
    formula: "=ISREF(\"A1\")"

  - id: isref_of_arithmetic
    formula: "=ISREF(1+2)"

  - id: isref_of_sum_call
    description: "SUM returns a Value, not a reference -> FALSE"
    setup: { A1: 1, A2: 2 }
    formula: "=ISREF(SUM(A1:A2))"

  - id: isref_of_indirect_valid
    description: "INDIRECT that resolves to a real ref -> TRUE"
    setup: { A1: 42 }
    formula: "=ISREF(INDIRECT(\"A1\"))"

  - id: isref_of_indirect_invalid
    description: "INDIRECT that surfaces #REF! -> FALSE"
    formula: "=ISREF(INDIRECT(\"not a ref\"))"

  - id: isref_of_offset
    setup: { A1: 42 }
    formula: "=ISREF(OFFSET(A1, 0, 0))"

  # -- SHEET (sheet number lookup) ----------------------------------------
  #
  # Tests that depend on the oracle workbook's sheet layout (SHEET(),
  # SHEET(A1), SHEET(A1:A2)) are intentionally absent: the oracle harness
  # writes each case to a fresh sheet, so Mac's SHEET() returns the
  # per-case sheet index while Formulon's single-sheet context always
  # returns 1. Those shapes are covered by unit tests instead.
  - id: sheet_of_missing_name_is_na
    description: "Unknown sheet name -> #N/A"
    formula: "=SHEET(\"NoSuchSheet\")"

  # -- SHEETS (count of sheets in a reference) ----------------------------
  #
  # SHEETS() with no args is similarly workbook-layout-dependent in the
  # oracle harness (returns 80+). Covered by unit tests.
  - id: sheets_of_single_ref
    description: "MVP: a non-3D reference spans exactly one sheet -> 1"
    setup: { A1: 42 }
    formula: "=SHEETS(A1)"

  - id: sheets_of_range
    setup: { A1: 1, A2: 2 }
    formula: "=SHEETS(A1:A2)"

  - id: sheets_of_non_reference_is_na
    description: "Mac: SHEETS(non-ref) -> #N/A, not #VALUE!"
    formula: "=SHEETS(42)"
