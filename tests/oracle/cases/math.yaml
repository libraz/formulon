suite: math
description: ABS / SIGN / INT / TRUNC / MOD / ROUND* / POWER / SQRT / EXP / LN / LOG / LOG10 / PI / VALUE
tolerance: { abs: 1.0e-12, rel: 1.0e-12 }
locale: ja-JP
cases:
  # -- ABS -----------------------------------------------------------------
  - id: abs_positive
    formula: "=ABS(5)"

  - id: abs_negative
    formula: "=ABS(-5)"

  - id: abs_zero
    formula: "=ABS(0)"

  - id: abs_fraction
    formula: "=ABS(-3.14)"

  # -- SIGN ----------------------------------------------------------------
  - id: sign_positive
    formula: "=SIGN(42)"

  - id: sign_negative
    formula: "=SIGN(-42)"

  - id: sign_zero
    formula: "=SIGN(0)"

  # -- INT (floor toward -inf) --------------------------------------------
  - id: int_positive_fraction
    formula: "=INT(3.7)"

  - id: int_negative_fraction
    description: "INT rounds toward -inf: INT(-3.7) = -4, not -3"
    formula: "=INT(-3.7)"

  - id: int_already_integer
    formula: "=INT(5)"

  # -- TRUNC (truncate toward zero) ---------------------------------------
  - id: trunc_positive_fraction
    formula: "=TRUNC(3.7)"

  - id: trunc_negative_fraction
    description: "TRUNC rounds toward 0: TRUNC(-3.7) = -3 (not -4)"
    formula: "=TRUNC(-3.7)"

  - id: trunc_with_digits
    formula: "=TRUNC(3.14159,2)"

  # -- MOD -----------------------------------------------------------------
  - id: mod_positive
    formula: "=MOD(10,3)"

  - id: mod_exact_division
    formula: "=MOD(10,5)"

  - id: mod_negative_dividend
    description: "Excel MOD sign follows divisor: MOD(-10,3) = 2"
    formula: "=MOD(-10,3)"

  - id: mod_zero_divisor_is_div0
    formula: "=MOD(5,0)"

  # -- ROUND / ROUNDUP / ROUNDDOWN ----------------------------------------
  - id: round_half_up
    description: "Excel: banker's rounding NOT used; .5 always rounds away from zero"
    formula: "=ROUND(2.5,0)"

  - id: round_neg_half
    formula: "=ROUND(-2.5,0)"

  - id: round_to_two_digits
    formula: "=ROUND(3.14159,2)"

  - id: round_to_neg_digits
    description: "Negative digits round to tens/hundreds"
    formula: "=ROUND(1234.5,-2)"

  - id: roundup_positive
    description: "ROUNDUP rounds away from zero"
    formula: "=ROUNDUP(3.14,1)"

  - id: roundup_negative
    formula: "=ROUNDUP(-3.14,1)"

  - id: rounddown_positive
    formula: "=ROUNDDOWN(3.19,1)"

  - id: rounddown_negative
    formula: "=ROUNDDOWN(-3.19,1)"

  # -- POWER / SQRT -------------------------------------------------------
  - id: power_square
    formula: "=POWER(5,2)"

  - id: power_fraction
    formula: "=POWER(2,0.5)"

  - id: power_negative_base_int_exp
    formula: "=POWER(-2,3)"

  - id: power_zero_to_zero
    description: "Excel returns 1 for POWER(0,0) (IEEE pow convention)"
    formula: "=POWER(0,0)"

  - id: sqrt_of_nine
    formula: "=SQRT(9)"

  - id: sqrt_of_zero
    formula: "=SQRT(0)"

  - id: sqrt_of_negative_is_num
    formula: "=SQRT(-1)"

  # -- EXP / LN / LOG / LOG10 ---------------------------------------------
  - id: exp_of_zero
    formula: "=EXP(0)"

  - id: exp_of_one
    formula: "=EXP(1)"

  - id: ln_of_one
    formula: "=LN(1)"

  - id: ln_of_e
    formula: "=LN(EXP(1))"

  - id: ln_of_zero_is_num
    formula: "=LN(0)"

  - id: log_default_base_10
    description: "LOG(n) with no base defaults to base 10"
    formula: "=LOG(1000)"

  - id: log_explicit_base_2
    formula: "=LOG(8,2)"

  - id: log10_of_100
    formula: "=LOG10(100)"

  # -- Empty-string function-arg coercion ---------------------------------
  # Probe whether Excel rejects "" in numeric function contexts. Used to
  # decide whether coerce_to_number("") returns 0 or #VALUE! for the
  # function-arg path (separate from the arithmetic-operator path tested
  # in operators.yaml).
  - id: exp_of_empty_string
    formula: "=EXP(\"\")"

  - id: sign_of_empty_string
    formula: "=SIGN(\"\")"

  - id: abs_of_empty_string
    formula: "=ABS(\"\")"

  - id: int_of_empty_string
    formula: "=INT(\"\")"

  - id: sqrt_of_empty_string
    formula: "=SQRT(\"\")"

  # -- PI ------------------------------------------------------------------
  - id: pi_value
    formula: "=PI()"

  - id: pi_times_two
    formula: "=PI()*2"

  # -- VALUE ---------------------------------------------------------------
  - id: value_of_numeric_string
    formula: "=VALUE(\"42\")"

  - id: value_of_float_string
    formula: "=VALUE(\"3.14\")"

  - id: value_of_non_numeric_text
    formula: "=VALUE(\"hello\")"

  # -- CEILING / FLOOR / MROUND / *.MATH ----------------------------------
  - id: ceiling_pos
    formula: "=CEILING(4.3,1)"

  - id: ceiling_neg_same_sign
    description: "Legacy CEILING with matching negative significance"
    formula: "=CEILING(-4.3,-1)"

  - id: ceiling_sign_mismatch_rounds_toward_plus_inf
    description: |
      Excel 365 Mac: legacy CEILING with opposite signs rounds toward
      +infinity (math ceil), NOT #NUM! as documented for pre-365 builds.
    formula: "=CEILING(-4.3,1)"

  - id: ceiling_sig_zero
    description: "Legacy CEILING: significance=0 short-circuits to 0"
    formula: "=CEILING(4.3,0)"

  - id: floor_pos
    formula: "=FLOOR(4.7,1)"

  - id: floor_neg_same_sign
    formula: "=FLOOR(-4.3,-1)"

  - id: floor_sign_mismatch_rounds_toward_minus_inf
    description: |
      Excel 365 Mac: legacy FLOOR with opposite signs rounds toward
      -infinity (math floor), NOT #NUM! as documented for pre-365 builds.
    formula: "=FLOOR(-4.3,1)"

  - id: floor_sig_zero_is_div0
    description: "Legacy FLOOR quirk: significance=0 -> #DIV/0!, not 0"
    formula: "=FLOOR(4.3,0)"

  - id: mround_basic
    formula: "=MROUND(10,3)"

  - id: mround_tie_away_from_zero
    description: "MROUND ties round away from zero: 7.5/3 = 2.5 -> 3 -> 9"
    formula: "=MROUND(7.5,3)"

  - id: mround_negative
    formula: "=MROUND(-10,-3)"

  - id: mround_sign_mismatch_is_num
    formula: "=MROUND(10,-3)"

  - id: mround_multiple_zero
    description: "MROUND: multiple=0 returns 0 (no #DIV/0!)"
    formula: "=MROUND(5,0)"

  - id: ceiling_math_default_sig
    formula: "=CEILING.MATH(4.3)"

  - id: ceiling_math_neg_default_mode
    description: "Default mode=0 rounds negatives toward +inf (toward zero)"
    formula: "=CEILING.MATH(-4.3)"

  - id: ceiling_math_neg_mode_away
    description: "mode != 0 rounds negatives away from zero (toward -inf)"
    formula: "=CEILING.MATH(-4.3,1,1)"

  - id: ceiling_math_sig_neg_uses_abs
    description: "Negative significance is allowed in *.MATH; uses |sig|"
    formula: "=CEILING.MATH(4.3,-2)"

  - id: floor_math_default_sig
    formula: "=FLOOR.MATH(4.7)"

  - id: floor_math_neg_default_mode
    description: "Default mode=0 rounds negatives toward -inf (away from zero)"
    formula: "=FLOOR.MATH(-4.3)"

  - id: floor_math_neg_mode_toward_zero
    description: "mode != 0 rounds negatives toward zero (toward +inf)"
    formula: "=FLOOR.MATH(-4.3,1,1)"

  # -- SUMSQ / SUMX2PY2 / SUMX2MY2 / SUMXMY2 / SERIESSUM --------------------
  - id: sumsq_basic
    formula: "=SUMSQ(3, 4)"

  - id: sumsq_range
    setup: { A1: 3, A2: 4, A3: 5 }
    formula: "=SUMSQ(A1:A3)"

  - id: sumsq_skips_text_in_range
    description: "Text cells in a range argument are dropped silently"
    setup: { A1: 3, A2: "x", A3: 5 }
    formula: "=SUMSQ(A1:A3)"

  - id: sumsq_direct_text_is_value
    description: "A non-numeric direct text argument surfaces #VALUE!"
    formula: "=SUMSQ(3, \"abc\")"

  - id: sumx2py2_basic
    description: "Σ (x² + y²) over {1,2,3} and {4,5,6} = 91"
    formula: "=SUMX2PY2({1;2;3}, {4;5;6})"

  - id: sumx2my2_basic
    description: "Σ (x² - y²) over {1,2,3} and {4,5,6} = -63"
    formula: "=SUMX2MY2({1;2;3}, {4;5;6})"

  - id: sumxmy2_basic
    description: "Σ (x - y)² over {1,2,3} and {4,5,6} = 27"
    formula: "=SUMXMY2({1;2;3}, {4;5;6})"

  - id: sumx2py2_shape_mismatch_is_na
    description: "Mismatched rectangles return #N/A"
    formula: "=SUMX2PY2({1;2;3}, {4;5})"

  - id: sumx2my2_single_point
    description: "Single-element arrays: 2² - 5² = -21"
    formula: "=SUMX2MY2({2}, {5})"

  - id: seriessum_binary_polynomial
    description: "Σ xⁱ for i=0..3 with x=2 and unit coefficients -> 15"
    formula: "=SERIESSUM(2, 0, 1, {1;1;1;1})"

  - id: seriessum_step_two
    description: "2² + 2⁴ = 20"
    formula: "=SERIESSUM(2, 2, 2, {1;1})"

  - id: seriessum_x_equals_one
    description: "x=1 makes every power one: sum is just Σ coefficients"
    formula: "=SERIESSUM(1, 0, 1, {5;5;5})"
