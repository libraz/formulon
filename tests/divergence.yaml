  #   * factor == 0: returns 0 (no depreciation)
  #   * salvage > cost: returns the depreciable difference (negative)
  # Formulon rejects all three with #NUM!. The fix is to relax the
  # input checks in `src/eval/builtins/financial_depreciation.cpp::Vdb`.
  - id: vdb_start_period_gte_end_is_num
