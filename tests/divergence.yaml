# Known / accepted divergences between Formulon and Mac Excel 365 (ja-JP).
#
# Every entry documents a case where the oracle verifier would otherwise
# fail. Two modes are supported:
#
#   mode: skip-oracle
#     Case is excluded from oracle-gen and oracle-verify. Use sparingly —
#     only for intrinsically non-reproducible results (NOW, RAND, TODAY
#     without a seed injection) or oracle bugs (e.g. Mac Excel CVErr
#     inconsistency). Prefer widening tolerance when possible.
#
#   tolerance: { abs: <N>, rel: <N> }
#     Case is generated and verified, but the verifier accepts any result
#     within the given absolute-or-relative tolerance. Default is strict
#     equality (0.0 / 0.0). Use for expected ±1ulp drift on transcendental
#     / statistical functions.
#
# Every entry MUST carry a `reason` string that cites an incident or
# source; `prefer` optionally records which implementation we trust if the
# two differ (Mac Excel 365 / Win Excel 365 / Formulon). PR reviewers
# check this file's diff on any oracle-gen roll-forward.
#
# Schema (parsed by tools/oracle/oracle_gen.py::_load_divergence_skips
# and by the divergence tooling planned in backup/plans/07 §7.4):
#
#   entries:
#     - id: <case_id from tests/oracle/cases/*.yaml>
#       reason: "..."
#       mode: skip-oracle | tolerance      # default: tolerance
#       tolerance: { abs: 1e-10, rel: 0 }
#       prefer: mac-excel-365 | win-excel-365 | formulon
#       first_noted: YYYY-MM-DD
#       last_verified_excel_version: "16.xx.x (Build ...)"

entries:
  # -- xlwings empty-string round-trip gap ---------------------------------
  # The Mac xlwings driver cannot write a cell holding the empty string
  # "": assigning "" leaves the cell genuinely blank from Excel's point of
  # view. Symmetrically, reading a cell whose formula returned "" comes
  # back as None (blank) rather than as the text "". Both directions
  # break the four cases below. These are genuine Formulon-vs-Excel
  # agreements that we cannot round-trip through the current oracle
  # infrastructure; revisit if we replace xlwings with AppleScript/COM
  # direct writes. Kept in the YAML so the divergences are visible.
  - id: isblank_of_empty_string
    mode: skip-oracle
    reason: "xlwings writes \"\" as a blank cell, so Excel reports ISBLANK=TRUE even though Formulon correctly says FALSE."
    prefer: formulon
    first_noted: 2026-04-23
  - id: t_of_number
    mode: skip-oracle
    reason: "xlwings classifies the empty-string result of =T(42) as blank on read-back; Formulon returns text(\"\") which is strictly correct."
    prefer: formulon
    first_noted: 2026-04-23
  - id: t_of_bool
    mode: skip-oracle
    reason: "Same xlwings \"\" -> blank read-back gap as t_of_number."
    prefer: formulon
    first_noted: 2026-04-23
  - id: t_of_blank_cell
    mode: skip-oracle
    reason: "Same xlwings \"\" -> blank read-back gap as t_of_number."
    prefer: formulon
    first_noted: 2026-04-23
  - id: left_zero_count
    mode: skip-oracle
    reason: "LEFT(\"abcdef\",0) -> \"\"; xlwings read-back classifies as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: mid_start_beyond_length
    mode: skip-oracle
    reason: "MID with start beyond length -> \"\"; xlwings reads as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: mid_zero_length
    mode: skip-oracle
    reason: "MID(...,n,0) -> \"\"; xlwings reads as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: rept_zero_count
    mode: skip-oracle
    reason: "REPT(s,0) -> \"\"; xlwings reads as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: leftb_zero_count
    mode: skip-oracle
    reason: "LEFTB(\"hello\",0) -> \"\"; xlwings read-back classifies as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: midb_start_beyond
    mode: skip-oracle
    reason: "MIDB with start beyond length -> \"\"; xlwings reads as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: text_empty_format
    mode: skip-oracle
    reason: "=TEXT(42, \"\") -> \"\" which xlwings read-back classifies as blank. Formulon correctly returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: roman_zero_is_empty
    mode: skip-oracle
    reason: "ROMAN(0) -> \"\"; xlwings reads as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-23
  - id: unary_plus_empty_string
    mode: skip-oracle
    reason: "=+\"\" -> \"\" (unary plus is identity); xlwings reads the empty string back as blank. Formulon returns text(\"\")."
    prefer: formulon
    first_noted: 2026-04-25
  - id: countif_notequal_empty_over_mixed
    mode: skip-oracle
    reason: "xlwings writes \"\" as a blank cell, so Excel's COUNTIF(range, \"<>\") over a range with a literal-\"\" cell sees one fewer populated cell than Formulon's in-memory model. Formulon returns 3, Mac records 2 due to the xlwings round-trip gap."
    prefer: formulon
    first_noted: 2026-04-25

  # -- CODE / CHAR: Mac Excel ja-JP uses CP932 / JIS X 0208 encoding ------
  # Mac Excel ja-JP's CODE / CHAR operate on the Shift-JIS (CP932)
  # codepage: for single-byte characters we match exactly, but for
  # double-byte characters CODE returns the JIS X 0208 row-cell encoding
  # (e.g. CODE("あ") == 9250 == 0x2422) and CHAR on DBCS lead-byte values
  # (0x81..0x9F, 0xE0..0xFC) returns a variety of fallback glyphs.
  # Implementing full CP932 / JIS mapping requires a ~8 KB table that is
  # not yet justified against the WASM size budget. Formulon returns the
  # Unicode codepoint instead; cases that trip this are listed here.
  - id: code_hiragana_first
    mode: skip-oracle
    reason: "Mac Excel ja-JP CODE returns JIS X 0208 row-cell (9250 for \"あ\"); Formulon returns the Unicode codepoint (12354) pending a CP932 table."
    prefer: mac-excel-365
    first_noted: 2026-04-23

  # -- ISFORMULA of non-reference literals ---------------------------------
  # Mac Excel 365 returns `#VALUE!` for ISFORMULA(42) and
  # ISFORMULA("A1"), matching the documented rule that ISFORMULA expects
  # a reference. xlwings reads that specific error back as blank (the
  # CVErr path the driver uses mis-maps #VALUE! from these argument
  # shapes), so the golden records `kind: blank` rather than the actual
  # error. Formulon correctly surfaces `#VALUE!`. Skipped until we
  # replace the xlwings read-back with an AppleScript/COM path.
  - id: isformula_of_literal_number_is_value
    mode: skip-oracle
    reason: "Mac returns #VALUE!; xlwings reads it back as blank, producing a spurious kind mismatch."
    prefer: formulon
    first_noted: 2026-04-23
  - id: isformula_of_literal_text_is_value
    mode: skip-oracle
    reason: "Mac returns #VALUE!; xlwings reads it back as blank, producing a spurious kind mismatch."
    prefer: formulon
    first_noted: 2026-04-23

  # -- Space-as-intersection operator --------------------------------------
  # Formulon's tokenizer emits Whitespace tokens but the parser drops them
  # at construction time (`src/parser/parser.cpp` filter loop), so the
  # space binary intersection operator never reaches the Pratt parser and
  # `make_intersect_op` is dead code. As a side effect the parser silently
  # uses only the first operand of `A1:B2 C3:D4`, which makes
  # arg_intersection_operator coincidentally agree with Excel (both = 1)
  # but for entirely the wrong reason; the disjoint counterpart fails
  # because Excel returns #NULL! while Formulon returns 1. Both cases are
  # skipped together until tokenizer / parser support the operator
  # properly; reinstate by removing these entries once IntersectOp wiring
  # lands.
  - id: arg_intersection_operator
    mode: skip-oracle
    reason: "Space-as-intersection operator not yet parsed. Currently passes by accident; skipped to avoid masking the missing feature."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"

  - id: arg_intersection_disjoint
    mode: skip-oracle
    reason: "Disjoint range intersection should yield #NULL! per Excel; Formulon parser drops the second operand and returns 1. Same root cause as arg_intersection_operator (Whitespace token discarded by parser)."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"

  # -- TEXT format codes: Japanese era (G / GG / GGG / GGGE / E) ----------
  # The format-string engine in `src/eval/builtins/text_format.cpp` does
  # not yet recognise Japanese era tokens. Format codes containing G/E
  # currently render as literal characters instead of resolving to
  # 令和 / 平成 / 昭和 / 大正 / 明治 + era year. Implementation requires an
  # era table (start dates per era) plus era-year arithmetic.
  - id: text_era_ggge_reiwa
    mode: skip-oracle
    reason: "GGGE (full era + year) not implemented. Excel: 令和6年4月1日."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"
  - id: text_era_gge_reiwa
    mode: skip-oracle
    reason: "GGE (abbreviated era + year) not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_era_ge_reiwa
    mode: skip-oracle
    reason: "GE (single-letter era + year) not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_era_e_only
    mode: skip-oracle
    reason: "Era year token E without era prefix not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_era_ggge_heisei_last_day
    mode: skip-oracle
    reason: "Heisei boundary (2019-04-30 last day) not implemented; era-table absent."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_era_ggge_reiwa_first_day
    mode: skip-oracle
    reason: "Reiwa boundary (2019-05-01 first day) not implemented; era-table absent."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_era_ggge_showa_first_day
    mode: skip-oracle
    reason: "Showa boundary (1926-12-25 first day) not implemented; era-table absent."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- TEXT format codes: ja-JP weekday tokens (aaa / aaaa) ----------------
  # `src/eval/builtins/text_format.cpp` renders aaa / aaaa as literal text
  # instead of resolving to 月/火/水/木/金/土/日 (aaa) or 月曜日 等 (aaaa).
  - id: text_dow_aaa
    mode: skip-oracle
    reason: "aaa weekday token not implemented; Excel: 月. Formulon emits literal 'aaa'."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_dow_aaaa
    mode: skip-oracle
    reason: "aaaa full-weekday token not implemented; Excel: 月曜日."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_date_with_aaa
    mode: skip-oracle
    reason: "Date concatenated with aaa weekday — not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- TEXT format codes: DBNum (numeral system selector) ------------------
  # `[DBNum1]` / `[DBNum2]` / `[DBNum3]` switch to kanji / 大字 / full-width
  # numerals. Currently the bracket directive triggers #VALUE!: the format
  # parser rejects the whole format string. Implementation requires
  # numeral-table mapping + bracket-directive pre-processor.
  - id: text_dbnum1
    mode: skip-oracle
    reason: "[DBNum1] kanji numerals not implemented; Excel: 一千二百三十四. Formulon: #VALUE!."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_dbnum2
    mode: skip-oracle
    reason: "[DBNum2] 大字 (formal-document numerals) not implemented; Excel: 壱阡弐百参拾四."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_dbnum3
    mode: skip-oracle
    reason: "[DBNum3] full-width Arabic not implemented; Excel: １２３４."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_dbnum1_with_era
    mode: skip-oracle
    reason: "[DBNum1] combined with era format — depends on both DBNum and era support."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- TEXT format codes: fraction display (# ?/?, # ??/??) ---------------
  # Fraction codes render as ' 0/0' regardless of the numerator/denominator
  # inputs — best-rational-approximation is not yet implemented in
  # `src/eval/builtins/text_format.cpp`.
  - id: text_fraction_single_digit
    mode: skip-oracle
    reason: "# ?/? fraction not implemented; Excel: ' 1/2'. Formulon: ' 0/0'."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_fraction_two_digit
    mode: skip-oracle
    reason: "# ??/?? fraction with two-digit denominator not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_fraction_with_integer
    mode: skip-oracle
    reason: "Fraction with leading integer not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_fraction_negative
    mode: skip-oracle
    reason: "Negative fraction not implemented."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- TEXT format codes: conditional brackets [<n] / [>n] ----------------
  # Bracket-prefixed conditional sections are rejected by the format
  # parser; Excel uses them to gate which section a value falls into.
  # Currently any `[<` or `[>` directive returns #VALUE!.
  - id: text_conditional_gt_1000
    mode: skip-oracle
    reason: "[>1000] conditional section not implemented; Formulon returns #VALUE!."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: text_conditional_gt_1000_below
    mode: skip-oracle
    reason: "[>1000] conditional section not implemented (below-threshold path)."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- TEXT format codes: locale-tagged currency [$JPY-411] ---------------
  # Currency directives like `[$JPY-411]` should emit the locale-tagged
  # currency prefix; Formulon silently strips the directive.
  - id: text_currency_jpy_locale
    mode: skip-oracle
    reason: "[$JPY-411] currency directive not implemented; prefix is dropped from output."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- TEXT format codes: asterisk-fill (* + char) ------------------------
  # `*-` should pad the cell with `-` characters to fill the column width.
  # In TEXT() the directive is observably a no-op (column width is
  # absent); Formulon currently leaks `*-` as literal characters into the
  # output.
  - id: text_asterisk_repeat_dash
    mode: skip-oracle
    reason: "Asterisk-fill directive `*-` leaks as literal; Excel emits it as a no-op in TEXT()."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- DATEVALUE: Japanese era prefix parsing (令和 / 平成 / 昭和 / 大正 / 明治) --
  # `src/eval/date_text_parse.cpp` doesn't recognise era-prefixed Japanese
  # date strings; all forms collapse to #VALUE!. Mac Excel parses these
  # permissively — even Heisei year 32 (past the actual era end at year
  # 31) is linearly extrapolated to 2020, and Reiwa year 1 / April is
  # accepted despite Reiwa starting May 1. The "is_value" suffix on the
  # boundary cases reflects the original (incorrect) test design; Excel
  # actually returns numbers, and Formulon needs to match.
  - id: datevalue_era_reiwa_full
    mode: skip-oracle
    reason: "令和6年4月1日 era prefix not parsed; Excel: 45383, Formulon: #VALUE!."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"
  - id: datevalue_era_heisei_full
    mode: skip-oracle
    reason: "平成31年4月30日 era prefix not parsed."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: datevalue_era_reiwa_first_day
    mode: skip-oracle
    reason: "令和1年5月1日 era prefix not parsed."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: datevalue_era_showa_full
    mode: skip-oracle
    reason: "昭和64年1月7日 era prefix not parsed."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: datevalue_era_taisho_full
    mode: skip-oracle
