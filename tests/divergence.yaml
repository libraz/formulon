  - id: timevalue_jp_kanji_units
    mode: skip-oracle
    reason: "8時30分 kanji time form not parsed; Formulon: #VALUE!."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: timevalue_jp_kanji_units_with_seconds
