  # "unspecified" but the oracle pins it for parity.
  - id: match_unsorted_with_approx
    mode: skip-oracle
    reason: "MATCH match_type=1 on unsorted data: Excel returns largest seen-so-far position (3); Formulon: #N/A."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: vlookup_approx_unsorted
    mode: skip-oracle
    reason: "VLOOKUP range_lookup=TRUE on unsorted lookup_array: Excel deterministically picks last-seen-le; Formulon: #N/A."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- XNPV / XIRR: input-validation strictness gaps ----------------------
  # Mac Excel 365 rejects three scenarios that Formulon's solver
  # currently handles with a numeric result. All three are valid as pure
  # math but Mac Excel treats them as input errors:
  #   * XNPV with rate = 0 (mathematically just sum(values))
  #   * XNPV with unsorted dates (first date not the earliest)
  #   * XIRR with extreme negative guess that drives Newton-Raphson out
  #     of the well-defined region
  # The fix in Formulon would tighten the input checks in
  # `src/eval/builtins/financial_xirr_xnpv.cpp`.
  - id: xnpv_zero_rate
    mode: skip-oracle
    reason: "XNPV(0, ...) — Mac Excel: #NUM!, Formulon: sum(values) by linearity. Mac quirk."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"
  - id: xnpv_first_date_after_others_is_num
    mode: skip-oracle
    reason: "XNPV unsorted dates: Excel #NUM!; Formulon does not enforce sort order."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: xirr_negative_guess
    mode: skip-oracle
    reason: "XIRR with extreme negative guess (-0.5): Excel #NUM!; Formulon's Newton-Raphson still converges to 0.373."
    prefer: mac-excel-365
    first_noted: 2026-04-26

  # -- LET: range bindings flatten to scalar ------------------------------
  # `=LET(r, A1:A3, SUM(r))` should produce 60 (sum of the bound range)
  # but Formulon evaluates the binding once and stores it as a Value
  # variant that already collapses to the spill anchor (A1=10), so SUM(r)
  # sees a single cell. Same root cause for COUNT and VLOOKUP bindings.
  # The fix is in how `src/eval/special_forms_lazy.cpp::LetBinding`
  # captures range-shaped sub-expressions — it needs to preserve
  # range-ness for downstream aggregator / lookup consumers, the same
  # way `expand_offset_call` integrates with `resolve_range_arg`.
  # Note: bare body references like `=LET(r, A1:A3, r)` and arithmetic
  # like `=LET(r, A1:A3, r+1)` *do* pass because the spill-anchor read
  # at Z1 happens to match the (incorrectly) collapsed first-cell value.
  - id: range_binding_sum
    mode: skip-oracle
    reason: "LET range binding collapses to spill anchor before SUM consumes it; Excel: 60, Formulon: 10."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"
  - id: range_binding_count
    mode: skip-oracle
    reason: "LET range binding collapses to scalar before COUNT iterates."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: range_binding_in_lookup
    mode: skip-oracle
    reason: "LET range binding cannot serve as VLOOKUP table_array; Formulon: #VALUE!."
    prefer: mac-excel-365
    first_noted: 2026-04-26

