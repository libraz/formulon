    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: datevalue_era_r_abbrev
    mode: skip-oracle
    reason: "R6.4.1 single-letter era prefix not parsed."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: datevalue_era_h_abbrev
    mode: skip-oracle
    reason: "H31.4.30 single-letter era prefix not parsed."
