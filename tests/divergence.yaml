  # -- ACCRINT: calc_method=FALSE first-interest semantics ---------------
  # Per the MS docs, `calc_method=FALSE` accrues from `first_interest` to
  # `settlement`. Mac Excel actually appears to use `issue -> settlement`
  # regardless: with issue=2008-03-01 / first_interest=2008-05-01 /
  # settlement=2008-08-31, Excel returns 50.0 (= par * rate * 0.5y =
  # the issue-to-settlement period under 30/360), where Formulon's
  # 33.33 matches the documented first-interest-to-settlement period.
  # Mac quirk that Formulon should mirror for 1-bit parity.
  - id: accrint_calc_method_false_first_interest
    mode: skip-oracle
    reason: "Mac Excel ignores calc_method=FALSE for the period start; uses issue->settlement (50.0). Formulon: 33.33 (first_interest->settlement)."
    prefer: mac-excel-365
    first_noted: 2026-04-26
    last_verified_excel_version: "16.108.1"

  # -- VDB: input-validation gaps -----------------------------------------
  # Mac Excel is more permissive than expected; the `_is_num` suffix on
