  # -- DATEVALUE / TIMEVALUE: full-width Arabic digits --------------------
  # `src/eval/date_text_parse.cpp` does not normalise U+FF10..U+FF19
  # full-width digits to their ASCII equivalents before parsing.
  - id: datevalue_fullwidth_digits_iso
    mode: skip-oracle
    reason: "Full-width digits in ISO date (２０２４-４-１) not normalised; Excel accepts."
    prefer: mac-excel-365
    first_noted: 2026-04-26
  - id: datevalue_fullwidth_digits_kanji
    mode: skip-oracle
