  - id: ironcalc_calc_tests_COUNTIFS_Rows2.AD10
    reason: "Same as AD3 with criterion AC10; Mac=4, IronCalc=3. Probe: countif_edges (countif_cell_criterion_bool_true_with_text)."
    prefer: mac
    first_noted: 2026-04-26

  # Pattern E — CONCAT("<>", TRUE) over same mixed range with blanks
  - id: ironcalc_calc_tests_COUNTIF_Rows.AJ3
    reason: "COUNTIF(AG2:AG15, CONCAT(<>, AH3=TRUE)). Criterion becomes \"<>TRUE\"; Mac counts 4 explicit non-TRUE + 6 blanks = 10; IronCalc=11. Probe: countif_edges (countif_concat_ne_bool_true_over_range_with_blanks = 6 over an 8-populated + 2-blank range)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Rows.AJ6
