# Known / accepted divergences between IronCalc and Mac Excel 365.
#
# This file is the IronCalc-oracle counterpart to `tests/divergence.yaml`.
# It documents cases where IronCalc's cached value disagrees with Mac
# Excel 365, and Formulon intentionally tracks the Mac behaviour. The
# IronCalc importer (`tools/oracle/ironcalc_import.py`) replaces each
# matching case's `expect` with `"skipped": "<reason>"` so the C++ test
# driver (`tests/oracle/oracle_test.cpp`) reports the case as
# gtest-skipped rather than failed.
#
# Mac-vs-Formulon divergences belong in `tests/divergence.yaml`. This
# file is exclusively for divergences against IronCalc's published
# behaviour, and every entry MUST cite a Mac-side probe golden under
# `tests/oracle/golden/` as evidence that Formulon's behaviour matches
# Mac (so the skip is legitimate and not just hiding a Formulon bug).
#
# The id format is "<suite>.<addr>" — the same composite key the
# parameterized test runner prints. The suite name is the one written
# by the IronCalc importer (e.g.
# `ironcalc_calc_tests_STRING_HANDLING_Sheet1`) and the addr is the
# A1 reference of the cell under test (e.g. `B8`).
#
# Schema (parsed by tools/oracle/ironcalc_import.py::_load_divergence_skips):
#
#   entries:
#     - id: <suite>.<addr>
#       reason: "<one-line summary including the probe reference>"
#       prefer: mac | ironcalc            # which side we trust
#       first_noted: YYYY-MM-DD

entries:
  # -- STRING_HANDLING: text functions on error inputs --------------------
  # Mac Excel propagates errors through text-family functions: any error
  # input produces the same error code as output. IronCalc instead
  # textifies the error to its display string ("#DIV/0!") and runs the
  # function on the resulting text — so e.g. LEN(#DIV/0!) returns 7 in
  # IronCalc and #DIV/0! on Mac. Formulon matches Mac.
  # Probe: tests/oracle/golden/text_function_error_probes.golden.json
  # (19 cases). Every STRING_HANDLING.A8 case below has `A8 = #DIV/0!`
  # fed into a text function.
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.B8
    reason: "Mac propagates error through LEN; IronCalc textifies to LEN(\"#DIV/0!\")=7. Probe: text_function_error_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.C8
    reason: "Mac propagates error through LOWER; IronCalc textifies. Probe: text_function_error_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.E8
    reason: "Mac propagates error through LEFT; IronCalc textifies. Probe: text_function_error_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.F8
    reason: "Mac propagates error through LEFT(_,3); IronCalc textifies. Probe: text_function_error_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.H8
    reason: "Mac propagates error before negative-length validation; IronCalc validates negative-length first and surfaces #VALUE!. Probe: text_function_error_probes (text_err_left_neg_div0)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.J8
    reason: "Mac propagates error through RIGHT; IronCalc textifies. Probe: text_function_error_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.K8
    reason: "Mac propagates error through RIGHT(_,3); IronCalc textifies. Probe: text_function_error_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.M8
    reason: "Mac propagates error before negative-length validation; IronCalc validates first. Probe: text_function_error_probes (text_err_right_neg_na)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_STRING_HANDLING_Sheet1.P8
    reason: "Mac propagates error through TRIM and through LEN; IronCalc textifies twice. Probe: text_function_error_probes (text_err_trim_div0)."
    prefer: mac
    first_noted: 2026-04-26

  # -- simple_functions Implicit_Intersection: out-of-alignment ranges ----
  # IronCalc applies strict legacy implicit-intersection: when the
  # formula cell is outside both the row span and the column span of a
  # 1D range, the range collapses to #VALUE!. Mac Excel 365 instead
  # spills the range into adjacent cells; xlwings reads the spill anchor
  # (the top-left cell). Formulon matches Mac (spill semantics).
  # Probe: tests/oracle/golden/implicit_intersection.golden.json
  - id: ironcalc_calc_tests_simple_functions_Implicit_Intersection.B15
    reason: "IronCalc legacy II returns #VALUE! for col-misaligned 1D vertical range; Mac spills (anchor = top-left). Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_simple_functions_Implicit_Intersection.D15
    reason: "IronCalc legacy II returns #VALUE! for row-misaligned 1D horizontal range; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_simple_functions_Implicit_Intersection.I14
    reason: "IronCalc legacy II returns #VALUE! for col-misaligned 1D vertical range; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_simple_functions_Implicit_Intersection.L15
    reason: "IronCalc legacy II returns #VALUE! for row-misaligned 1D horizontal range with absolute refs; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26

  # -- T_VALUE_VALUETOTEXT: VALUE() date parsing under ja-JP locale -------
  # IronCalc parses hyphen-format ("10-12-1999") and US slash-format
  # ("M/D/YYYY") date strings as numbers. Mac Excel 365 in ja-JP locale
  # rejects both with #VALUE!. Formulon follows Mac's locale-aware
  # behaviour. Probe: tests/oracle/golden/value_coercion_probes.golden.json
  - id: ironcalc_calc_tests_T_VALUE_VALUETOTEXT_Sheet1.I5
    reason: "VALUE(\"10-12-1999\") returns 36504 in IronCalc, #VALUE! on Mac ja-JP. Probe: value_coercion_probes (value_hyphen_date_1)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_T_VALUE_VALUETOTEXT_Sheet1.C15
    reason: "VALUE(\"2/3/2023\") returns 44960 in IronCalc, #VALUE! on Mac ja-JP. Probe: value_coercion_probes (value_slash_date_short)."
    prefer: mac
    first_noted: 2026-04-26

  # -- ROUND family: range arg, formula cell out of alignment -------------
  # IronCalc's strict legacy implicit-intersection collapses a column-
  # range argument to #VALUE! when the formula cell's row falls outside
  # the range. Mac Excel 365 instead spills the per-element rounded
  # array; xlwings reads the spill anchor (the top-cell rounded value).
  # Formulon matches Mac. Probe: implicit_intersection.golden.json
  # (round_col_range_row_excluded etc).
  - id: ironcalc_calc_tests_ROUND_Sheet1.L5
    reason: "ROUND(J7:J10, 2) at L5: row 5 not in 7..10. IronCalc legacy II = #VALUE!; Mac spills, anchor = ROUND(J7,2). Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROUND_Sheet1.M5
    reason: "ROUNDUP(J7:J10, 2) at M5: row 5 not in 7..10. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROUND_Sheet1.N5
    reason: "ROUNDDOWN(J7:J10, 2) at N5: row 5 not in 7..10. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROUND_Sheet1.T5
    reason: "ROUND(R7:R10, 2) at T5: row 5 not in 7..10. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROUND_Sheet1.U5
    reason: "ROUNDUP(R7:R10, 2) at U5: row 5 not in 7..10. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROUND_Sheet1.V5
    reason: "ROUNDDOWN(R7:R10, 2) at V5: row 5 not in 7..10. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26

  # -- ROW_COLUM OFFSET: range/array result with II misalignment ----------
  # Bare-range cell formulas and OFFSET array results trigger the same
  # legacy-II vs spill divergence as the ROUND cases above. Mac spills
  # to the formula cell as anchor; IronCalc returns #VALUE!. Formulon
  # matches Mac. Probe: implicit_intersection.golden.json.
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.U5
    reason: "Bare range =N2:P16 at U5: row 5 in range but col U not in N..P. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.I12
    reason: "Bare range =H1:O3 at I12: row 12 not in 1..3. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.M12
    reason: "OFFSET(A1,0,7,1,3) at M12 produces H1:J1; col M not in H..J. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.J19
    reason: "Bare range =P2:P16 at J19: row 19 not in 2..16. IronCalc legacy II = #VALUE!; Mac spills. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.K38
    reason: "OFFSET(RS33,2,2,-10,1) at K38: in-bounds 10-row rect (Mac accepts negative dim when result fits); col K not in RS, IronCalc legacy II = #VALUE!; Mac spills with anchor = 0. Probe: offset_indirect_probes (offset_neg_height_in_bounds)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.K39
    reason: "OFFSET(RS33,2,2,2,-2) at K39: in-bounds 2x2 rect (Mac accepts negative dim when result fits); II misaligned. IronCalc = #VALUE!; Mac spills. Probe: offset_indirect_probes (offset_neg_width_in_bounds)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_OFFSET.K43
    reason: "OFFSET(W39,2,2,2) at K43 produces Y41:Y42; col K not in Y. IronCalc legacy II = #VALUE!; Mac spills with anchor = Y41. Probe: implicit_intersection."
    prefer: mac
    first_noted: 2026-04-26

  # -- ROW_COLUM ROW/COLUMN(INDIRECT): missing-sheet INDIRECT -------------
  # IronCalc's ROW(INDIRECT("OTHER!D5")) returns 5 (the cell's row index)
  # even when sheet "OTHER" does not exist, on the theory that ROW only
  # extracts the index. Mac Excel 365 rejects with #REF! because INDIRECT
  # itself fails when the sheet is missing, and the error propagates.
  # Formulon matches Mac. Probe: offset_indirect_probes
  # (row_indirect_missing_sheet_string, column_indirect_missing_sheet_string).
  - id: ironcalc_calc_tests_ROW_COLUM_ROW_COLUMN.K6
    reason: "ROW(INDIRECT(\"OTHER!D5\")) returns 5 in IronCalc; Mac propagates #REF! from missing-sheet INDIRECT. Probe: offset_indirect_probes."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_ROW_COLUM_ROW_COLUMN.L6
    reason: "COLUMN(INDIRECT(\"OTHER!D5\")) returns 4 in IronCalc; Mac propagates #REF! from missing-sheet INDIRECT. Probe: offset_indirect_probes."
    prefer: mac
    first_noted: 2026-04-26

  # -- COUNTIF / COUNTIFS criterion-engine divergences --------------------
  # All entries below come from IronCalc's COUNTIF_Rows / COUNTIF_Columns /
  # COUNTIFS_Rows2 suites, which encode 5 distinct semantic positions where
  # IronCalc's cached values disagree with Mac Excel 365 (ja-JP). Formulon
  # matches Mac in every case. Probe corpus: countif_edges.golden.json
  # (31 cases). The reason text below names the specific countif_edges
  # case that pins the relevant Mac behaviour.
  #
  # Pattern A: error-criterion equality. COUNTIF(range, errcell) where
  # errcell = #N/A or #DIV/0! counts every range cell that holds the same
  # error code (literal or formula-produced). IronCalc only counts a
  # subset (often 1). Mac probes: countif_error_criterion_na_over_two_na,
  # countif_error_criterion_div0_over_div0, countif_error_criterion_div0_mixed_source.
  #
  # Pattern B: CONCAT("<>", errcell). CONCAT propagates the error
  # unchanged (probe: concat_of_ne_and_error_alone -> #N/A). COUNTIF then
  # treats the criterion as the bare error and matches range cells with
  # that exact error code. IronCalc instead textifies "<>#N/A" and
  # produces a different count. Mac probes:
  # countif_concat_ne_error_text_range, countif_concat_ne_error_mixed_range.
  #
  # Pattern C: text "<brown" lex less-than over names mixed with errors
  # / blanks. Mac case-insensitively counts only Albert + Bernanrd (twice
  # for double-listed names); errors and blanks never match. IronCalc
  # over-counts by one. Mac probes: countif_lex_lt_brown_names,
  # countif_lex_lt_brown_with_errors_blank.
  #
  # Pattern D: cell criterion holding bool TRUE over a range that mixes
  # bool TRUE/FALSE, number 1, and text "TRUE". Mac counts text "TRUE"
  # as matching bool TRUE (display-form coercion); IronCalc is type-
  # strict and excludes the text cell. Mac probes:
  # countif_cell_criterion_bool_true_with_text,
  # countif_cellref_text_true_uppercase.
  #
  # Pattern E: CONCAT("<>", TRUE) over the same mixed range with blank
  # cells. Mac counts blanks as matching "<>TRUE" but excludes text
  # "TRUE" (mirror of Pattern D). IronCalc over-counts by one. Mac
  # probe: countif_concat_ne_bool_true_over_range_with_blanks.

  # Pattern A — error-criterion equality
  - id: ironcalc_calc_tests_COUNTIF_Rows.AA2
    reason: "COUNTIF(range, #N/A criterion) counts all 2 #N/A cells on Mac; IronCalc cache says 1. Probe: countif_edges (countif_error_criterion_na_over_two_na = 2)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Rows.AA4
    reason: "Same as AA2 with criterion at Z4; Mac=2, IronCalc=1. Probe: countif_edges (countif_error_criterion_na_over_two_na)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Rows.V8
    reason: "COUNTIF(T2:T15, #DIV/0! criterion) counts all 3 #DIV/0! cells (1 literal + 2 formula-produced); IronCalc cache says 2. Probe: countif_edges (countif_error_criterion_div0_mixed_source = 3)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Rows.V10
    reason: "Same as V8 with criterion U10 = literal #DIV/0!; Mac=3, IronCalc=2. Probe: countif_edges (countif_error_criterion_div0_mixed_source)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.B27
    reason: "COUNTIF(B25:O25, #N/A criterion) counts all 2 #N/A cells; IronCalc=1. Probe: countif_edges (countif_error_criterion_na_over_two_na)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.D27
    reason: "Same pattern as B27 with criterion D26; Mac=2, IronCalc=1. Probe: countif_edges (countif_error_criterion_na_over_two_na)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.H20
    reason: "COUNTIF(B18:O18, #DIV/0! criterion via formula =1/0) counts all 3 #DIV/0! cells; IronCalc=2. Probe: countif_edges (countif_error_criterion_div0_mixed_source)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.J20
    reason: "Same as H20 with criterion J19 = literal #DIV/0!; Mac=3, IronCalc=2. Probe: countif_edges (countif_error_criterion_div0_mixed_source)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.T8
    reason: "COUNTIFS(R2:R15, #DIV/0! criterion via =1/0) counts all 3 #DIV/0! cells; IronCalc=2. Probe: countif_edges (countif_error_criterion_div0_mixed_source)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.T10
    reason: "Same as T8 with literal #DIV/0! criterion; Mac=3, IronCalc=2. Probe: countif_edges (countif_error_criterion_div0_mixed_source)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.X2
    reason: "COUNTIFS(V2:V15, #N/A criterion) counts all 2 #N/A cells; IronCalc=1. Probe: countif_edges (countif_error_criterion_na_over_two_na)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.X4
    reason: "Same as X2 with criterion W4; Mac=2, IronCalc=1. Probe: countif_edges (countif_error_criterion_na_over_two_na)."
    prefer: mac
    first_noted: 2026-04-26

  # Pattern B — CONCAT("<>", error) → criterion is the propagated error
  - id: ironcalc_calc_tests_COUNTIF_Rows.AB2
    reason: "COUNTIF(Y2:Y8, CONCAT(<>, Z2=#N/A)). CONCAT propagates #N/A; criterion becomes #N/A; Mac counts 2 #N/A cells. IronCalc=1. Probe: countif_edges (countif_concat_ne_error_mixed_range, concat_of_ne_and_error_alone)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Rows.AB4
    reason: "Same as AB2 with Z4=#N/A; Mac=2, IronCalc=6. Probe: countif_edges (countif_concat_ne_error_mixed_range)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.B28
    reason: "COUNTIF(B25:H25, CONCAT(<>, B26=#N/A)). Mac criterion is #N/A; counts 2 #N/A cells. IronCalc=1. Probe: countif_edges (countif_concat_ne_error_mixed_range)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.D28
    reason: "Same as B28 with criterion D26; Mac=2, IronCalc=6. Probe: countif_edges (countif_concat_ne_error_mixed_range)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.Y2
    reason: "COUNTIFS(V2:V8, CONCAT(<>, W2=#N/A)). Mac criterion is #N/A; counts 2 #N/A cells. IronCalc=1. Probe: countif_edges (countif_concat_ne_error_mixed_range)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.Y4
    reason: "Same as Y2 with criterion W4; Mac=2, IronCalc=6. Probe: countif_edges (countif_concat_ne_error_mixed_range)."
    prefer: mac
    first_noted: 2026-04-26

  # Pattern C — text "<brown" lex less-than over names + errors + blanks
  - id: ironcalc_calc_tests_COUNTIF_Rows.V4
    reason: "COUNTIF(T2:T15, U4='<brown') case-insensitively matches Albert/Bernanrd/Albert = 3; errors and blanks excluded. IronCalc=4. Probe: countif_edges (countif_lex_lt_brown_names = 3, countif_lex_lt_brown_with_errors_blank)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.D20
    reason: "COUNTIF(B18:O18, D19='<brown') over the same name+error mix as V4; Mac=3, IronCalc=4. Probe: countif_edges (countif_lex_lt_brown_names)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.T4
    reason: "COUNTIFS(R2:R15, S4='<brown') over the same name+error mix; Mac=3, IronCalc=4. Probe: countif_edges (countif_lex_lt_brown_names)."
    prefer: mac
    first_noted: 2026-04-26

  # Pattern D — cell criterion bool TRUE over mixed bool/number/text "TRUE"
  - id: ironcalc_calc_tests_COUNTIF_Rows.AI3
    reason: "COUNTIF(AG2:AG15, AH3=TRUE) — Mac matches 3 bool TRUE + 1 text \"TRUE\" = 4; IronCalc is type-strict and counts only 3. Probe: countif_edges (countif_cell_criterion_bool_true_with_text = 4)."
    prefer: mac
