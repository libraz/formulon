    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.J35
    reason: "Same as C35 with criterion J34 (text \"TRUE\"); Mac=4, IronCalc=3. Probe: countif_edges (countif_cellref_text_true_uppercase)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.AD3
    reason: "COUNTIFS(AB2:AB15, AC3=TRUE) — same Pattern D over the COUNTIFS suite; Mac=4, IronCalc=3. Probe: countif_edges (countif_cell_criterion_bool_true_with_text)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIFS_Rows2.AD6
    reason: "Same as AD3 with criterion AC6; Mac=4, IronCalc=3. Probe: countif_edges (countif_cell_criterion_bool_true_with_text)."
    prefer: mac
