  - id: ironcalc_calc_tests_COUNTIF_Columns.C35
    reason: "COUNTIF(B33:O33, C34=TRUE bool) over mixed bool/number/text TRUE; Mac=4, IronCalc=3. Probe: countif_edges (countif_cell_criterion_bool_true_with_text)."
    prefer: mac
    first_noted: 2026-04-26
  - id: ironcalc_calc_tests_COUNTIF_Columns.F35
